name: topology_mismatch
description: >
  Cross-source structural conflicts and catalog-side endpoint shifts.
  Tests detection of "catalog says A↔B, telemetry says A↔C" patterns.

seed: 91

inputs:
  golden_twin: benchmark/examples/golden_twin/l3vpn-hub-spoke.json

outputs:
  root: benchmark/out/topology_mismatch/
  catalog_dir: benchmark/out/topology_mismatch/catalog/
  telemetry_path: benchmark/out/topology_mismatch/telemetry.json
  ledger_path: benchmark/out/topology_mismatch/defect_ledger.jsonl

defects:
  - id: telemetry_endpoint_drift
    class: cross_source.structural_conflict
    target_projection: both
    target_entity_type: Interface_Link
    selection:
      mode: random_rate
      rate: 0.15

  - id: catalog_endpoint_shift
    class: accuracy.endpoint_shift
    target_projection: catalog
    target_entity_type: Interface_Link
    selection:
      mode: random_rate
      rate: 0.10
