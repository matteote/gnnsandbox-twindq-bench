<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>Cisco Router (2D)</title>
  
  <!-- Flat 2D Circle Base -->
  <circle cx="50" cy="50" r="45" fill="#0096D6" />

  <!-- Arrows -->
  <g fill="#FFFFFF">
    <!-- Left Arrow (Inward, pointing Right) -->
    <path d="M20,47 L35,47 L35,42 L45,50 L35,58 L35,53 L20,53 Z" />
    
    <!-- Right Arrow (Outward, pointing Right) -->
    <path d="M55,47 L70,47 L70,42 L80,50 L70,58 L70,53 L55,53 Z" />
    
    <!-- Top Arrow (Outward, pointing Up) -->
    <path d="M47,45 L47,30 L42,30 L50,20 L58,30 L53,30 L53,45 Z" />
    
    <!-- Bottom Arrow (Outward, pointing Down) -->
    <path d="M47,55 L47,70 L42,70 L50,80 L58,70 L53,70 L53,55 Z" />
  </g>
</svg>
