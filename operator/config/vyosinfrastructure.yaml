apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vyosinfrastructures.google.dev
  labels:
    type: network
    agent-accessible: "true"
spec:
  group: google.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            VyOSInfrastructure is the top-level CRD for provisioning a virtual network topology.
            The operator validates the spec, then generates and creates three categories of child CRs:
              - One LinuxNetwork CR per network entry (except 'loopbacks' which is skipped)
              - One VyOSRouter CR per router entry
              - One Device CR per device entry

            OPERATOR VALIDATION RULES (all must pass before any CRs are created):
              1. MANAGEMENT NETWORK: Exactly one network with network_type='management' is required.
                 The management network must NOT have a 'vlan' field set.
              2. MANAGEMENT INTERFACE ORDER: Every router's first interface (interfaces[0]) must
                 connect to the management network. Conversely, each entry in the management
                 network's connected_routers must reference that router's first interface.
              3. NO SUBNET OVERLAPS: All network subnets must be non-overlapping.
              4. IP CONSISTENCY: Every ip_address in networks[].connected_routers must fall
                 within that network's subnet. No two entries in the same network may share an IP.
              5. INTERFACE CROSS-REFERENCE: Each entry in routers[].interfaces (except 'lo')
                 must appear in the referenced network's connected_routers for that router, and
                 the interface name must match exactly.
              6. POLICY REFERENCES: All policy_name values in routers[].qos_policies must match
                 a name in spec.qos.policies. All policy_name values in routers[].firewall_policies
                 must match a name in spec.security.firewall.policies.

            LIFECYCLE:
              Validating → Processing → Creating → Ready | Error
              The parent transitions to Ready only when all child VyOSRouter CRs reach
              Running phase. Updates re-run the full create/reconcile logic.
              On delete, the Ops Agent scrape targets are cleared.
          properties:
            spec:
              type: object
              properties:
                description:
                  type: string
                  description: "Optional human-readable description of the overall infrastructure being provisioned."
                networks:
                  type: array
                  description: >
                    Defines the Layer-2 / Layer-3 network segments that routers and devices will attach to.
                    Each entry results in a LinuxNetwork CRD being created, EXCEPT a network named
                    'loopbacks' which is reserved for loopback address blocks and is skipped.
                    Routers reference these networks by name in their 'interfaces' list.

                    RULES:
                      - Exactly one network must have network_type='management'. This is enforced
                        by the operator before any CRs are created.
                      - The management network must not have a 'vlan' field defined.
                      - Subnet CIDR ranges must not overlap across any two networks.
                      - All ip_address values in connected_routers must fall within this network's subnet.
                      - No two connected_routers entries in the same network may share an ip_address.
                  items:
                    type: object
                    required:
                      - name
                      - subnet
                      - bandwidth
                    properties:
                      name:
                        type: string
                        description: >
                          Unique identifier for this network segment within the infrastructure.
                          Referenced by routers (interfaces[].network) and devices (network_name).
                          Used as the base name for the underlying LinuxNetwork bridge resource.
                          SPECIAL VALUE: A network named exactly 'loopbacks' is skipped — no
                          LinuxNetwork CR is created for it; it is used only to provide loopback
                          address information to routers.
                      subnet:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                        description: >
                          IPv4 subnet in CIDR notation (e.g. '10.0.1.0/30'). Defines the address
                          space for this segment. All router interface addresses (connected_routers[].ip_address)
                          must fall within this prefix. The prefix length is extracted and appended
                          to each router's ip_address when generating its VyOSRouter interface config
                          (e.g. ip_address '10.0.1.1' + subnet '10.0.1.0/30' → address '10.0.1.1/30').
                          Subnets must not overlap with any other network's subnet.
                      gateway:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                        description: >
                          Default gateway IP address for hosts on this segment. Must be within
                          the subnet. If specified, the operator propagates this value into each
                          generated VyOSRouter interface config (interface_config['gateway']) and
                          into the LinuxNetwork CR spec. Required if devices need outbound routing
                          via this segment.
                      ipv6_subnet:
                        type: string
                        description: >
                          Optional IPv6 prefix for dual-stack operation on this segment
                          (e.g. '2001:db8:1::/64'). When set, dual-stack addresses should
                          be configured on attached router interfaces.
                      description:
                        type: string
                        description: "Human-readable description of this network segment's purpose or topology role."
                      vlan:
                        type: integer
                        minimum: 1
                        maximum: 4094
                        description: >
                          802.1Q VLAN ID to tag traffic on this segment (1–4094). When set,
                          the underlying bridge will use a VLAN-aware configuration and
                          router interfaces will be brought up as sub-interfaces (e.g. eth1.100).
                          Omit for untagged (native) segments.
                          CONSTRAINT: The management network (network_type='management') must NOT
                          have a vlan set — the operator will reject the spec if it does.
                          The vlan value is propagated into each generated VyOSRouter interface config.
                      mtu:
                        type: integer
                        minimum: 68
                        maximum: 9000
                        default: 1500
                        description: >
                          Maximum Transmission Unit in bytes for this network segment. Default 1500.
                          Set to 9000 (or near) for jumbo frames on backbone links. Must be consistent
                          across all interfaces attached to this segment to avoid fragmentation.
                          The operator propagates this value into each generated VyOSRouter interface
                          config (interface_config['mtu']). If omitted, 1500 is used.
                      network_type:
                        type: string
                        enum: ["p2p", "multi-access", "management", "loopback"]
                        default: "multi-access"
                        description: >
                          Topology role for this network segment.

                          OPERATOR RULES:
                            'management' — EXACTLY ONE network must have this type. The operator
                              uses it to determine which routers' IPs to register as Ops Agent
                              Prometheus scrape targets (node_exporter :9100, frr_exporter :9101).
                              Only routers listed in this network's connected_routers are scraped.
                              Also, every router's first interface must connect to this network.
                            'p2p' — point-to-point link between exactly two routers (/30 or /31);
                              OSPF will use point-to-point network type.
                            'multi-access' — shared Ethernet segment; OSPF will use broadcast type.
                            'loopback' — loopback address block for router-id and BGP peering.

                          The value is also written to the LinuxNetwork CR label 'network-type'.
                      bandwidth:
                        type: string
                        pattern: '^([0-9]+[kmg]?bit|unlimited)$'
                        description: >
                          Nominal link bandwidth for this segment expressed as a rate string
                          (e.g. '1gbit', '100mbit', '10kbit'). Passed through to the LinuxNetwork
                          CR spec.bandwidth field. Used by the operator to configure traffic-control
                          (tc) rate limiting on the underlying veth pairs.
                      connected_routers:
                        type: array
                        description: >
                          Explicit list of routers and their interface assignments on this network.
                          This is the authoritative adjacency map used by the operator to wire
                          router veth pairs into the bridge AND to resolve IP addresses for router
                          interface generation.

                          OPERATOR RULES:
                            - Each entry must reference a router defined in spec.routers[].name.
                            - The ip_address must fall within this network's subnet.
                            - No two entries may share the same ip_address.
                            - For the management network: the interface listed here must be the
                              router's FIRST interface (interfaces[0].name).
                            - For non-loopback interfaces: the interface name here must exactly
                              match the corresponding routers[].interfaces[].name entry for this
                              network. The operator cross-validates both directions.
                            - The ip_address here is used by the operator to construct the router's
                              full interface address: "{ip_address}/{subnet_prefix_len}".
                            - For routers listed in the management network, the ip_address is also
                              registered with the Ops Agent as a Prometheus scrape target.
                        items:
                          type: object
                          required:
                            - router_name
                            - interface
                          properties:
                            router_name:
                              type: string
                              description: >
                                Name of the router (must match an entry in spec.routers[].name)
                                that is connected to this network segment.
                            interface:
                              type: string
                              pattern: '^eth[0-9]+$'
                              description: >
                                Linux ethernet interface name on the router VM that will be attached
                                to this network bridge (e.g. 'eth1'). Must follow the pattern
                                'ethN'. eth0 is conventionally reserved for management.
                                RULE: For the management network, this must be the router's first
                                interface (interfaces[0].name). The operator validates that both
                                this field and the router's interfaces[0] agree on the interface name.
                            ip_address:
                              type: string
                              pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                              description: >
                                IPv4 address (without prefix length) assigned to this router's
                                interface on the network. Must fall within the network's subnet.
                                The prefix length is derived from the parent network's subnet field
                                and the full CIDR address is written to the VyOSRouter interface spec.
                                For the management network, this IP is also registered with the Ops
                                Agent as a Prometheus scrape target for node_exporter and frr_exporter.
                routers:
                  type: array
                  description: >
                    Defines the virtual routers to provision as part of this infrastructure.
                    Each entry results in a VyOSRouter CRD being created and owned by this resource.

                    OPERATOR RULES:
                      - Each router must have at least one interface.
                      - The first interface (interfaces[0]) must connect to the management network.
                      - Interface names must exactly match the entries in the corresponding
                        network's connected_routers list.
                      - 'hostname' and 'router_id' are required — the operator uses them directly
                        without defaults when building the VyOSRouter spec.
                      - For loopback interfaces (name='lo'), the operator automatically sets the
                        address to '{router_id}/32' regardless of any address field in the spec.
                      - QoS policy names referenced in qos_policies must exist in spec.qos.policies.
                      - Firewall policy names referenced in firewall_policies must exist in
                        spec.security.firewall.policies.
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        description: >
                          Unique name for this router within the infrastructure. Used as the
                          VyOSRouter CR name and the metadata.name of the generated CR. Must be
                          unique across all routers in this spec. Referenced by networks[].connected_routers[].router_name.
                      hostname:
                        type: string
                        description: >
                          Hostname to configure on the router OS. REQUIRED in practice — the operator
                          passes this directly to the VyOSRouter spec.hostname field without a fallback.
                          Appears in CLI prompts and SNMP sysName.
                      router_id:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                        description: >
                          Router ID in IPv4 dotted-decimal notation. REQUIRED in practice — the
                          operator uses this directly when building the VyOSRouter spec without a
                          fallback. Used in two additional ways by the operator:
                            1. Loopback interface: when an interface has name='lo', the operator
                               sets its address to '{router_id}/32' automatically.
                            2. OSPF backbone area: the router_id /32 is added to the networks list
                               for the backbone area (area_id='0.0.0.0') for loopback advertisement.
                      type:
                        type: string
                        enum: ["vyos", "linux", "frr"]
                        default: "vyos"
                        description: >
                          Network OS / dataplane type for this router VM:
                          'vyos' — VyOS Linux-based router; operator provisions via VyOS
                            configuration API / commit scripts;
                          'linux' — plain Linux host using iproute2; operator provisions via
                            ip/tc commands and FRR if BGP/OSPF is needed;
                          'frr' — FRR (Free Range Routing) container; operator provisions via
                            FRR vtysh configuration.
                      role:
                        type: string
                        enum: ["P", "PE", "CE", "RR"]
                        description: >
                          MPLS / BGP topology role for this router. Written to the VyOSRouter
                          spec.role field. If omitted, defaults to 'P'.
                          Used by the BGP auto-configuration logic:
                            'PE' or any role with vrfs defined: the operator auto-enables the
                              vpnv4 address family if address_families is not explicitly set.
                            'RR' (route_reflector=true): also triggers auto-vpnv4 address family.
                          'P'  — Core provider router; OSPF + LDP/SR only.
                          'PE' — Provider Edge; OSPF + LDP/SR + MP-BGP VPNv4.
                          'CE' — Customer Edge; eBGP or static routes toward PE; no MPLS.
                          'RR' — Route Reflector; reflects MP-BGP VPNv4/VPNv6 routes.
                      image:
                        type: string
                        default: "vyos:1.5"
                        description: >
                          Docker / container image to use for this router VM. Written to the
                          VyOSRouter spec.image field. Defaults to 'vyos:1.5' if omitted.
                      location:
                        type: object
                        description: "GPS coordinates and location information for the router. Passed through as-is to VyOSRouter spec.location."
                        properties:
                          latitude:
                            type: number
                            description: "Latitude in decimal degrees"
                            minimum: -90
                            maximum: 90
                          longitude:
                            type: number
                            description: "Longitude in decimal degrees"
                            minimum: -180
                            maximum: 180
                          city:
                            type: string
                            description: "City or location name"
                          country:
                            type: string
                            description: "Country name or code"
                          site:
                            type: string
                            description: "Site or datacenter identifier"
                      interfaces:
                        type: array
                        description: >
                          Network interfaces to configure on this router.

                          OPERATOR RULES:
                            - At least one interface is required.
                            - interfaces[0] MUST connect to the management network (network_type='management').
                            - For each non-loopback interface, the interface name must match the
                              entry in networks[].connected_routers[].interface for the same router
                              and network. The operator validates both directions.
                            - For loopback (name='lo'): the address is ALWAYS set to '{router_id}/32'
                              by the operator, regardless of any address field in the spec.
                            - For all other interfaces: the address is computed as
                              '{connected_routers[ip_address]}/{subnet_prefix_len}', sourced from
                              the network's connected_routers entry for this router.
                            - MTU is inherited from the network's mtu field (default 1500).
                            - VLAN is inherited from the network's vlan field if set.
                            - The linux_network field on the generated VyOSRouter interface is set
                              to the network name (unless the network is 'loopbacks').
                        items:
                          type: object
                          required:
                            - name
                            - network
                          properties:
                            name:
                              type: string
                              pattern: '^(eth[0-9]+|lo)$'
                              description: >
                                Interface name on the router (e.g. 'eth1', 'lo'). Must match the
                                pattern 'ethN' for data-plane interfaces or 'lo' for loopback.
                                RULE: Must match the interface value in the referenced network's
                                connected_routers entry for this router. The operator enforces
                                exact string equality. For 'lo', no connected_routers entry is
                                required; address is auto-set to router_id/32.
                            network:
                              type: string
                              description: >
                                Name of the network segment (must match spec.networks[].name) that
                                this interface is attached to. The operator uses this to look up
                                the subnet, mtu, vlan, and ip_address for this router from the
                                network's connected_routers list, then builds the full interface
                                config for the VyOSRouter CR.
                            address:
                              type: string
                              pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                              description: >
                                IPv4 address with prefix length in CIDR notation. NOTE: For
                                non-loopback interfaces, this field is IGNORED by the operator —
                                the address is always computed from the network's connected_routers
                                ip_address + subnet prefix length. For 'lo' interfaces, the address
                                is always set to '{router_id}/32'. This field has no effect.
                            description:
                              type: string
                              description: "Human-readable description of this interface's purpose or peer. Passed through to VyOSRouter interface spec."
                      services:
                        type: object
                        description: >
                          Network services to enable on this router. Passed through as-is to
                          the VyOSRouter spec.services field. Services are provisioned after
                          interfaces are brought up.
                        properties:
                          dhcp:
                            type: array
                            description: >
                              DHCP server instances to run on this router. Each entry configures
                              a DHCP server for one network segment. The router must have an
                              interface in the referenced network's subnet.
                            items:
                              type: object
                              required:
                                - network
                                - gateway
                              properties:
                                network:
                                  type: string
                                  description: >
                                    CIDR subnet this DHCP server serves (e.g. '192.168.1.0/24').
                                    Must match a network segment the router is attached to.
                                gateway:
                                  type: string
                                  description: >
                                    Default gateway IP address advertised to DHCP clients.
                                    Typically the router's own interface address on this segment.
                                dns_servers:
                                  type: array
                                  description: >
                                    List of DNS server IP addresses advertised to DHCP clients
                                    via DHCP option 6. If omitted, no DNS option is sent.
                                  items:
                                    type: string
                                range:
                                  type: object
                                  description: >
                                    Dynamic address pool from which the DHCP server assigns IPs.
                                    Start and end must fall within the network's subnet and must
                                    not overlap with statically assigned addresses.
                                  required:
                                    - start
                                    - end
                                  properties:
                                    start:
                                      type: string
                                      description: "First IP address in the dynamic pool (e.g. '192.168.1.100')."
                                    end:
                                      type: string
                                      description: "Last IP address in the dynamic pool (e.g. '192.168.1.200')."
                                static_mappings:
                                  type: array
                                  description: >
                                    Fixed IP-to-MAC reservations. Clients with a matching MAC
                                    address always receive the specified IP from the DHCP server.
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - ip
                                      - mac
                                    properties:
                                      name:
                                        type: string
                                        description: "Friendly label for this static mapping (e.g. host name)."
                                      ip:
                                        type: string
                                        description: >
                                          Fixed IP address to assign to this client. Must be within
                                          the DHCP network subnet and outside the dynamic range.
                                      mac:
                                        type: string
                                        description: >
                                          MAC address of the client in colon-separated hex notation
                                          (e.g. 'aa:bb:cc:dd:ee:ff'). Case-insensitive.
                          nat:
                            type: object
                            description: >
                              Network Address Translation configuration for this router. Enables
                              source NAT / masquerade so that private-addressed devices behind
                              the router can reach external networks via the router's public interface.
                            properties:
                              source:
                                type: array
                                description: >
                                  Source NAT rules, evaluated in ascending rule-number order.
                                  Each rule rewrites the source address of matching outbound packets.
                                items:
                                  type: object
                                  required:
                                    - rule
                                    - outbound_interface
                                  properties:
                                    rule:
                                      type: integer
                                      description: >
                                        Rule priority number. Lower numbers are evaluated first.
                                        Must be unique within this router's source NAT list.
                                        Conventional range: 1–9999.
                                    source:
                                      type: string
                                      description: >
                                        Source IP or CIDR that this rule matches (e.g. '10.0.0.0/8').
                                        If omitted, matches all source addresses (0.0.0.0/0).
                                    outbound_interface:
                                      type: string
                                      description: >
                                        Egress interface name whose traffic this rule is applied to
                                        (e.g. 'eth0'). Packets leaving via this interface and
                                        matching the source prefix will be NAT'd.
                                    translation:
                                      type: string
                                      enum: ["masquerade", "address"]
                                      default: "masquerade"
                                      description: >
                                        NAT translation mode:
                                        'masquerade' — dynamically replaces the source IP with the
                                          outbound interface's current IP address;
                                        'address' — translate to a fixed IP address.
                      qos_policies:
                        type: array
                        description: >
                          QoS policy bindings for this router. Each entry attaches a named policy
                          (defined in spec.qos.policies) to a specific interface and direction.

                          OPERATOR RULE: Every policy_name referenced here must match a name in
                          spec.qos.policies[].name. The operator validates all references before
                          creating any CRs and will reject the spec if any are missing.

                          The operator transforms these bindings into the VyOSRouter spec.qos.policies
                          list: [{name, interface, direction}] for each entry.
                        items:
                          type: object
                          required:
                            - policy_name
                            - interface
                          properties:
                            policy_name:
                              type: string
                              description: >
                                Name of the QoS policy to apply. Must exactly match a name in
                                spec.qos.policies[].name. The operator validates this reference
                                before CR creation; a missing policy is a permanent error.
                            interface:
                              type: string
                              description: >
                                Interface on this router to which the QoS policy is applied
                                (e.g. 'eth1'). Must match one of the router's configured interfaces.
                            direction:
                              type: string
                              enum: ["in", "out"]
                              default: "out"
                              description: >
                                Traffic direction relative to the router interface.
                                Defaults to 'out' if omitted.
                                'out' — shape/police traffic leaving the interface (egress);
                                'in'  — police traffic arriving on the interface (ingress).
                      firewall_policies:
                        type: array
                        description: >
                          Firewall policy bindings for this router. Each entry attaches a named
                          policy (defined in spec.security.firewall.policies) to a specific
                          interface and direction.

                          OPERATOR RULE: Every policy_name referenced here must match a name in
                          spec.security.firewall.policies[].name. The operator validates all
                          references before creating any CRs and will reject the spec if any are
                          missing.

                          The operator transforms these into the VyOSRouter spec.firewall.policies
                          list: [{name, interface, direction}] for each entry.
                        items:
                          type: object
                          required:
                            - policy_name
                            - interface
                          properties:
                            policy_name:
                              type: string
                              description: >
                                Name of the firewall policy to apply. Must exactly match a name in
                                spec.security.firewall.policies[].name. The operator validates this
                                reference before CR creation; a missing policy is a permanent error.
                            interface:
                              type: string
                              description: >
                                Interface on this router to which the firewall policy is applied
                                (e.g. 'eth0'). Must match one of the router's configured interfaces.
                            direction:
                              type: string
                              enum: ["in", "out", "local"]
                              description: >
                                Traffic direction at which the firewall policy is evaluated:
                                'in'    — packets arriving on this interface destined for other interfaces;
                                'out'   — packets leaving via this interface (after routing);
                                'local' — packets destined for the router itself (SSH, BGP, OSPF hellos).
                devices:
                  type: array
                  description: >
                    End-user devices or CPEs to deploy alongside routers. Each entry results in
                    a Device CR owned by this VyOSInfrastructure.

                    OPERATOR POPULATION RULES:
                      - The Device CR spec.mgmt_network field is NOT taken from this spec. It is
                        automatically derived by the operator from the management network name
                        (the network with network_type='management') in spec.networks.
                      - Only devices with both 'name' and 'mgmt_ip' set are registered with the
                        Ops Agent as Prometheus scrape targets (port 9091 for traffic-agent metrics).
                      - Device CR fields gateway, vlan, and image are only included in the
                        generated CR when explicitly set in this spec (not defaulted).
                  items:
                    type: object
                    required:
                      - name
                      - network_name
                      - ip_address
                      - mgmt_ip
                    properties:
                      name:
                        type: string
                        maxLength: 8
                        description: >
                          Device name (≤8 chars — used for veth pair naming). Also used as the
                          Device CR metadata.name. Must be unique within the namespace.
                          Included in Ops Agent scrape config if mgmt_ip is also set.
                      network_name:
                        type: string
                        maxLength: 15
                        description: >
                          Name of the data-plane LinuxNetwork bridge to attach to. Written to
                          Device CR spec.network_name. Must match an entry in spec.networks[].name.
                      ip_address:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                        description: "Data-plane IP address for the device. Written to Device CR spec.ip_address."
                      mgmt_ip:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                        description: >
                          Management IP — the traffic-agent daemon listens here on port 9090.
                          Written to Device CR spec.mgmt_ip. Also used by the Ops Agent for
                          Prometheus scraping on port 9091. Must be reachable from the monitoring
                          VM via the management network.
                      gateway:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                        description: >
                          Default gateway for the data-plane interface (optional). Only included
                          in the Device CR if explicitly set here.
                      vlan:
                        type: integer
                        minimum: 1
                        maximum: 4094
                        description: "VLAN ID for 802.1Q tagged traffic (optional). Only included in the Device CR if explicitly set."
                      image:
                        type: string
                        default: "device:latest"
                        description: "Docker image for the device container. Only included in the Device CR if explicitly set here."
                qos:
                  type: object
                  description: >
                    Global QoS policy definitions for this infrastructure. Policies defined here
                    are referenced by name in routers[].qos_policies[].policy_name.

                    OPERATOR RULE: Every policy_name in routers[].qos_policies must exactly match
                    a name in spec.qos.policies[].name. Missing references cause a permanent
                    validation error before any CRs are created.
                  properties:
                    policies:
                      type: array
                      description: >
                        List of named QoS policies available to be applied to router interfaces.
                        Each policy creates an HTB qdisc with the specified bandwidth ceiling
                        and optional traffic classes for differentiated treatment.
                      items:
                        type: object
                        required:
                          - name
                          - bandwidth
                        properties:
                          name:
                            type: string
                            description: >
                              Unique name for this QoS policy. Referenced by
                              routers[].qos_policies[].policy_name. Must be unique within
                              spec.qos.policies.
                          bandwidth:
                            type: string
                            description: >
                              Total bandwidth ceiling for this policy expressed as a rate string
                              (e.g. '100mbit', '1gbit').
                          classes:
                            type: array
                            description: >
                              Traffic classes within this policy for differentiated per-class
                              bandwidth guarantees and priorities (HTB child classes).
                            items:
                              type: object
                              required:
                                - name
                                - priority
                                - bandwidth
                              properties:
                                name:
                                  type: string
                                  description: "Name for this traffic class (e.g. 'voice', 'video', 'best-effort')."
                                priority:
                                  type: integer
                                  description: >
                                    Scheduling priority for this class relative to siblings. Lower
                                    numbers indicate higher priority.
                                bandwidth:
                                  type: string
                                  description: "Guaranteed bandwidth for this class (e.g. '20mbit')."
                                dscp:
                                  type: string
                                  description: >
                                    DSCP marking used to classify packets into this class
                                    (e.g. 'EF' for Expedited Forwarding / voice, 'AF41' for
                                    assured video, 'BE' / 'CS0' for best-effort).
                security:
                  type: object
                  description: >
                    Global security (firewall) policy definitions for this infrastructure.
                    Policies defined here are referenced by name in
                    routers[].firewall_policies[].policy_name.

                    OPERATOR RULE: Every policy_name in routers[].firewall_policies must exactly
                    match a name in spec.security.firewall.policies[].name. Missing references
                    cause a permanent validation error before any CRs are created.
                  properties:
                    firewall:
                      type: object
                      description: >
                        Stateful firewall configuration. Policies are named ACL sets that
                        contain ordered rules evaluated top-to-bottom.
                      properties:
                        policies:
                          type: array
                          description: >
                            List of named firewall policies available for binding to router
                            interfaces. Each policy is a self-contained stateful ACL with its
                            own rule set and default action.
                          items:
                            type: object
                            required:
                              - name
                              - default_action
                            properties:
                              name:
                                type: string
                                description: >
                                  Unique name for this firewall policy. Referenced by
                                  routers[].firewall_policies[].policy_name. Must be unique
                                  within spec.security.firewall.policies.
                              default_action:
                                type: string
                                enum: ["accept", "drop", "reject"]
                                description: >
                                  Action applied to packets that do not match any rule:
                                  'accept' — permit the packet;
                                  'drop'   — silently discard the packet;
                                  'reject' — discard and send ICMP unreachable / TCP RST.
                              rules:
                                type: array
                                description: >
                                  Ordered list of stateful firewall rules evaluated in ascending
                                  'number' order. The first matching rule's action is applied.
                                items:
                                  type: object
                                  required:
                                    - number
                                    - action
                                  properties:
                                    number:
                                      type: integer
                                      description: >
                                        Rule sequence number. Lower numbers are evaluated first.
                                        Must be unique within the policy. Conventional ranges:
                                        1–999 for permit rules, 9000–9999 for explicit deny rules.
                                    action:
                                      type: string
                                      enum: ["accept", "drop", "reject"]
                                      description: >
                                        Action to take when a packet matches this rule:
                                        'accept' — permit; 'drop' — silently discard;
                                        'reject' — discard and send ICMP unreachable / TCP RST.
                                    protocol:
                                      type: string
                                      enum: ["tcp", "udp", "icmp", "all"]
                                      description: >
                                        IP protocol this rule matches. Use 'all' to match any
                                        protocol. Use 'tcp' or 'udp' with 'ports' for port filtering.
                                    ports:
                                      type: array
                                      description: >
                                        List of destination port numbers this rule matches when
                                        protocol is 'tcp' or 'udp'. Ignored for 'icmp' or 'all'.
                                      items:
                                        type: integer
                                    source:
                                      type: string
                                      description: >
                                        Source IP address or CIDR prefix this rule matches
                                        (e.g. '10.0.0.0/8'). If omitted, matches any source.
                                    destination:
                                      type: string
                                      description: >
                                        Destination IP address or CIDR prefix this rule matches.
                                        If omitted, matches any destination.
                                    state:
                                      type: array
                                      description: >
                                        Connection tracking states this rule matches.
                                        'established' / 'related' in an early-numbered 'accept'
                                        rule is the standard pattern for return traffic.
                                      items:
                                        type: string
                                        enum: ["established", "related", "new", "invalid"]
                                    description:
                                      type: string
                                      description: "Human-readable description of what this rule permits or blocks."
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: >
                    Current lifecycle phase set by the operator:
                    'Validating' — topology validation in progress;
                    'Processing' — resources are being generated;
                    'Creating'   — child CRDs (LinuxNetworks, VyOSRouters, Devices) are being created;
                    'Ready'      — all child VyOSRouters have reached Running phase;
                    'Error'      — a terminal error occurred; see 'message' for details.
                    Transitions to Ready are triggered by VyOSRouter and Device status change events.
                message:
                  type: string
                  description: "Human-readable status message from the operator describing the current phase or error detail."
                routers:
                  type: array
                  description: "Names of VyOSRouter CRDs created and owned by this infrastructure."
                  items:
                    type: string
                devices:
                  type: array
                  description: "Names of Device CRs created by this infrastructure"
                  items:
                    type: string
                networks:
                  type: array
                  description: "Names of LinuxNetwork CRDs created and owned by this infrastructure."
                  items:
                    type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Routers
          type: integer
          jsonPath: .status.routers[*]
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  names:
    kind: VyOSInfrastructure
    plural: vyosinfrastructures
    singular: vyosinfrastructure
    shortNames:
      - vyosinfra
      - infra
  scope: Namespaced
