- name: Get running kernel version
  ansible.builtin.command: uname -r
  register: running_kernel

- name: Install linux-modules-extra
  ansible.builtin.package:
    name: "linux-modules-extra-{{ running_kernel.stdout }}"
    state: present

- name: Install packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - bridge-utils
    - python3-pip
    - nmon

- name: Load vrf kernel module
  ansible.builtin.command: modprobe vrf
  changed_when: false

- name: Ensure vrf module is loaded on boot
  ansible.builtin.copy:
    content: "vrf\n"
    dest: /etc/modules-load.d/vrf.conf

- name: Install iptables-persistent for saving rules
  ansible.builtin.package:
    name: iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Disable UFW
  ansible.builtin.shell: ufw disable

- name: flush iptables
  ansible.builtin.shell: |
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT
    iptables -F
    iptables -t nat -F
    iptables -t mangle -F
    iptables -X

- name: add persistent ICMP rule
  ansible.builtin.shell: |
    # Check if rule already exists
    if ! iptables -C FORWARD -p icmp -j ACCEPT -m comment --comment "Allow ICMP for network traffic" 2>/dev/null; then
      iptables -I FORWARD 1 -p icmp -j ACCEPT -m comment --comment "Allow ICMP for network traffic"
      echo "changed"
    fi

- name: Save iptables rules
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4

- name: install dev packages for gtp compile
  ansible.builtin.apt:
    pkg:
      - git
      - gcc
      - g++ 
      - cmake 
      - autoconf 
      - libtool 
      - pkg-config 
      - libmnl-dev 
      - libyaml-dev
    state: latest
    update_cache: true

- name: install gcc 12
  ansible.builtin.apt:
    pkg:
      - gcc-12
    state: latest

- name: install headers matching kernel
  apt:
    pkg:
    - linux-headers-{{ running_kernel.stdout }}

- name: create /opt/gtp5
  file:
    path: /opt/gtp5
    state: directory
    mode: '0777' 

- name: git checkout from gtp5
  ansible.builtin.git:
    version: v0.8.10
    depth: 1
    repo: https://github.com/free5gc/gtp5g.git
    dest: /opt/gtp5
    clone: yes  # Ensure the repo is cloned (not just updated)
    update: yes
    force: yes 

- name: Build and install gtp module
  ansible.builtin.shell: |
    make clean
    make
    make install
  args:
    chdir: /opt/gtp5

