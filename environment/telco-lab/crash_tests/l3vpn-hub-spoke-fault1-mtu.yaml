        - area: 0.0.0.0
          type: backbone
      bgp:
        as_number: 65001
        router_id: 10.0.0.11
        neighbors:
        - peer: 10.0.0.1
          remote_as: 65001
        - peer: 10.0.0.2
          remote_as: 65001
      mpls:
        enabled: true
        ldp:
          router_id: 10.0.0.11
          interfaces:
          - eth1
  - name: ce3-spoke
    protocols:
      bgp:
        as_number: 65035
        router_id: 10.0.0.91
        neighbors:
        - peer: 10.70.70.1
          remote_as: 65001
---
apiVersion: google.dev/v1
kind: VyOSL3VPN
metadata:
  name: l3vpn-blue-service
  namespace: default
spec:
  underlayRef: l3vpn-hub-spoke-underlay
  services:
  - name: BLUE_SPOKE
    type: l3vpn
    topology: spoke
  - name: BLUE_HUB
    type: l3vpn
    topology: hub
  routers:
  - name: pe1
    vrfs:
    - name: BLUE_SPOKE
      table: 200
      rd: 10.50.50.1:1011
      rt_export:
      - 65035:1011
      rt_import:
      - 65035:1030
      interfaces:
      - eth2
    bgp:
      vrfs:
      - name: BLUE_SPOKE
        neighbors:
        - peer: 10.50.50.2
          remote_as: 65035
  - name: pe2
    vrfs:
    - name: BLUE_HUB
      table: 400
      rd: 10.80.80.1:1011
      rt_export:
      - 65035:1030
      rt_import:
      - 65035:1011
      - 65035:1030
      interfaces:
      - eth3
    bgp:
      vrfs:
      - name: BLUE_HUB
        neighbors:
        - peer: 10.80.80.2
          remote_as: 65035
  - name: pe3
    vrfs:
    - name: BLUE_SPOKE
      table: 200
      rd: 10.60.60.1:1011
      rt_export:
      - 65035:1011
      rt_import:
      - 65035:1030
      interfaces:
