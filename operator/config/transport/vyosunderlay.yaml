apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vyosunderlays.google.dev
spec:
  group: google.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            VyOSUnderlay defines the underlay network protocols (OSPF, BGP, MPLS) for a VyOS network infrastructure.
            
            DEPENDENCY: This resource requires a VyOSInfrastructure to be in 'Ready' state before it can be applied.
            The operator will wait and retry (every 10 seconds) until the referenced infrastructure is ready.
            
            Lifecycle phases:
            - Waiting: The referenced VyOSInfrastructure is not yet ready
            - Processing: Applying underlay protocol configuration to routers
            - Ready: All underlay protocols have been successfully configured
            - Error: Failed to apply configuration
          properties:
            spec:
              type: object
              required:
                - infrastructureRef
              properties:
                infrastructureRef:
                  type: string
                  description: |
                    Name of the VyOSInfrastructure resource this underlay is built on.
                    The operator will wait for this infrastructure to reach 'Ready' status before proceeding.
                    Example: 'l3vpn-hub-spoke-infra'
                mpls:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    ldp:
                      type: object
                      properties:
                        router_id_interface:
                          type: string
                          default: "loopback"
                        label_range:
                          type: object
                          properties:
                            min:
                              type: integer
                            max:
                              type: integer
                routing:
                  type: object
                  properties:
                    ospf:
                      type: object
                      properties:
                        router_id_source:
                          type: string
                          default: "loopback"
                        areas:
                          type: array
                          items:
                            type: object
                            required:
                              - area_id
                              - type
                            properties:
                              area_id:
                                type: string
                              type:
                                type: string
                                enum: ["backbone", "standard", "stub", "nssa"]
                              description:
                                type: string
                    bgp:
                      type: object
                      properties:
                        as_number:
                          type: integer
                        router_id_source:
                          type: string
                          default: "loopback"
                        route_reflectors:
                          type: array
                          items:
                            type: string
                        external_peers:
                          type: array
                          items:
                            type: object
                            required:
                              - peer
                              - as_number
                            properties:
                              peer:
                                type: string
                              as_number:
                                type: integer
                              description:
                                type: string
                routers:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      protocols:
                        type: object
                        description: "Routing protocols configuration (must match VyOSRouter CRD schema)"
                        properties:
                          ospf:
                            type: object
                            properties:
                              router_id:
                                type: string
                                pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                                description: "OSPF router ID"
                              areas:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - area
                                  properties:
                                    area:
                                      type: string
                                      pattern: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'
                                      description: "OSPF area ID"
                                    networks:
                                      type: array
                                      items:
                                        type: string
                                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                                      description: "Networks to advertise in this area"
                                    interfaces:
                                      type: array
                                      items:
                                        type: string
                                      description: "Interfaces in this area"
                                    type:
                                      type: string
                                      enum: ["backbone", "standard", "stub", "nssa"]
                                      default: "standard"
                                      description: "Area type"
                              passive_interfaces:
                                type: array
                                items:
                                  type: string
                                description: "Passive interfaces"
                          bgp:
                            type: object
                            properties:
                              as_number:
                                type: integer
                                minimum: 1
                                maximum: 4294967295
                                description: "BGP AS number"
                              router_id:
                                type: string
                                pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                                description: "BGP router ID"
                              route_reflector:
                                type: boolean
                                default: false
                                description: "Enable route reflector"
                              neighbors:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - peer
                                    - remote_as
                                  properties:
                                    peer:
                                      type: string
                                      pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                                      description: "Neighbor IP address"
                                    remote_as:
                                      type: integer
                                      minimum: 1
                                      maximum: 4294967295
                                      description: "Remote AS number"
                                    description:
                                      type: string
                                      description: "Neighbor description"
                                    route_reflector_client:
                                      type: boolean
                                      default: false
                                      description: "Route reflector client"
                              address_families:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - family
                                  properties:
                                    family:
                                      type: string
                                      enum: ["ipv4-unicast", "ipv4-multicast", "ipv6-unicast", "vpnv4", "vpnv6"]
                                      description: "Address family"
                                    networks:
                                      type: array
                                      items:
                                        type: string
                                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                                      description: "Networks to advertise"
                          mpls:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                                default: false
                                description: "Enable MPLS"
                              ldp:
                                type: object
                                properties:
                                  router_id:
                                    type: string
                                    pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                                    description: "LDP router ID"
                                  interfaces:
                                    type: array
                                    items:
                                      type: string
                                    description: "LDP-enabled interfaces"
                          static:
                            type: object
                            description: "Static routing configuration"
                            properties:
                              routes:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - destination
                                  properties:
                                    destination:
                                      type: string
                                      pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                                      description: "Destination network in CIDR notation"
                                    next_hop:
                                      type: string
                                      pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                                      description: "Next hop IP address"
                                    interface:
                                      type: string
                                      description: "Exit interface name"
                                    distance:
                                      type: integer
                                      minimum: 1
                                      maximum: 255
                                      default: 1
                                      description: "Administrative distance"
                                    description:
                                      type: string
                                      description: "Route description"
                                    vrf:
                                      type: string
                                      description: "VRF name for VRF-specific routes"
                          traffic_policy:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                            description: "Traffic control policy properties"
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Infra
          type: string
          jsonPath: .spec.infrastructureRef
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  names:
    kind: VyOSUnderlay
    plural: vyosunderlays
    singular: vyosunderlay
    shortNames:
      - underlay
  scope: Namespaced
