apiVersion: configsync.gke.io/v1beta1
kind: RepoSync
metadata:
  name: repo-sync
  namespace: network
spec:
  sourceType: git
  sourceFormat: unstructured
  git:
    repo: https://{{ lookup('env', 'WEBAPPS_LOGIN') }}:{{ lookup('env', 'WEBAPPS_PWD') }}@{{external_ip_address}}:3000/{{ lookup('env', 'WEBAPPS_LOGIN') }}/network
    revision: HEAD
    branch: master
    auth: none
    gcpServiceAccountEmail: networkagent@me.com
    noSSLVerify: True
