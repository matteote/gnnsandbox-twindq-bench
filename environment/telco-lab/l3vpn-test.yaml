---
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: multi-source-load-test
  namespace: default
  labels:
    scenario: load-test
    pattern: constant
spec:
  source_devices:
    - dev1  # First source device
    - dev2  # Second source device
  destination_device: devhub
  protocol: TCP
  port: 5201 # base port, each source gets its own port
  duration: 14400  # 240 minutes
  bandwidth: 5Mbps  # Each source sends 5Mbps
  pattern_type: constant
  concurrent_users: 10

