---
# NetworkFailure Injection Playbook
#
# Injects a controlled network fault into a VyOS router running as a Docker
# container on the network VM. The playbook:
#   1. Saves the current (original) router configuration for later restoration
#   2. Applies the fault configuration using docker exec on the target router
#   3. Returns the original_state as an Ansible fact for the operator to persist
#
# Supported failure_type values:
#   - MTU_MISMATCH
#   - BGP_SESSION_DOWN
#   - PROCESS_CRASH
#   - PACKET_CORRUPTION
#   - LINK_DOWN
#   - OSPF_AREA_MISMATCH
#   - DUPLICATE_IP
#   - TXQUEUE_STARVATION
#   - OSPF_COST_INFLATION
#   - VRF_RT_MISCONFIGURATION
#
# Variables (passed via extravars):
#   failure_name    - Name of the NetworkFailure resource
#   failure_type    - One of the failure types above
#   router          - Docker container name of the target router
#   interface       - Router interface name (e.g., eth1)
#   peer_ip         - BGP peer IP address (BGP_SESSION_DOWN only)
#   vrf             - VRF name (BGP_SESSION_DOWN / VRF_RT_MISCONFIGURATION only)
#   mtu             - Target MTU value (MTU_MISMATCH only)
#   error_rate      - Packet error rate e.g. "5%" (PACKET_CORRUPTION only)
#   method          - "process_kill" or "loopback_disable" (PROCESS_CRASH only)
#   remote_as       - BGP remote AS number (BGP_SESSION_DOWN only)
#   wrong_area      - OSPF area to wrongly assign (OSPF_AREA_MISMATCH only)
#   correct_area    - Current correct OSPF area (OSPF_AREA_MISMATCH only)
#   duplicate_ip    - IP/prefix to duplicate (DUPLICATE_IP only)
#   queue_length    - Target txqueuelen value (TXQUEUE_STARVATION only)
#   ospf_cost       - OSPF cost to set (OSPF_COST_INFLATION only)
 #   peer_router     - Second router name (LINK_DOWN bridge mode only)
 #   link_down_mode  - "interface" or "bridge" (LINK_DOWN only)
 #   bridge          - Derived Linux bridge name (LINK_DOWN bridge mode only)
 #   wrong_rt        - Wrong RT import community (VRF_RT_MISCONFIGURATION only)
 #   correct_rt      - Correct RT import community (VRF_RT_MISCONFIGURATION only)

- name: NetworkFailure - Fault Injection
  hosts: all
  become: true
  gather_facts: false
  tasks:

    - name: Log injection start
      debug:
        msg: >
          [{{ failure_name }}] Injecting '{{ failure_type }}' on router '{{ router }}'
          (interface={{ interface | default('N/A') }})

    # =========================================================================
    # MTU_MISMATCH
    # =========================================================================
    - name: "[MTU_MISMATCH] Read current MTU from router interface"
      shell: >
        docker exec {{ router }}
        ip link show {{ interface }} | awk '/mtu/ {for(i=1;i<=NF;i++) if ($i=="mtu") print $(i+1)}'
      register: current_mtu_result
      when: failure_type == 'MTU_MISMATCH'
      failed_when: false

    - name: "[MTU_MISMATCH] Save original MTU as Ansible fact"
      set_fact:
        original_state:
          mtu: "{{ current_mtu_result.stdout | trim | default('1500') | int }}"
      when: failure_type == 'MTU_MISMATCH'

    - name: "[MTU_MISMATCH] Apply faulty MTU via VyOS configuration"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "interface {{ interface }}" \
          -c "ip mtu {{ mtu }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'MTU_MISMATCH'
      register: mtu_inject_result
      failed_when: mtu_inject_result.rc != 0

    - name: "[MTU_MISMATCH] Verify MTU was applied"
      shell: >
        docker exec {{ router }}
        ip link show {{ interface }} | awk '/mtu/ {for(i=1;i<=NF;i++) if ($i=="mtu") print $(i+1)}'
      register: verify_mtu
      when: failure_type == 'MTU_MISMATCH'
      failed_when: false

    - name: "[MTU_MISMATCH] Log verification"
      debug:
        msg: "[{{ failure_name }}] MTU on {{ router }}/{{ interface }} is now {{ verify_mtu.stdout | trim }} (target: {{ mtu }})"
      when: failure_type == 'MTU_MISMATCH'

    # =========================================================================
    # BGP_SESSION_DOWN
    # =========================================================================
    - name: "[BGP_SESSION_DOWN] Save original BGP neighbor config as fact"
      set_fact:
        original_state:
          peer_ip: "{{ peer_ip }}"
          remote_as: "{{ remote_as }}"
          vrf: "{{ vrf }}"
      when: failure_type == 'BGP_SESSION_DOWN'

    - name: "[BGP_SESSION_DOWN] Tear down eBGP session in VRF via VyOS"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "router bgp {{ remote_as }} vrf {{ vrf }}" \
          -c "no neighbor {{ peer_ip }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'BGP_SESSION_DOWN' and vrf != 'global'
      register: bgp_vrf_inject_result
      failed_when: bgp_vrf_inject_result.rc != 0

    - name: "[BGP_SESSION_DOWN] Tear down iBGP session in global table via VyOS"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "router bgp {{ remote_as }}" \
          -c "no neighbor {{ peer_ip }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'BGP_SESSION_DOWN' and vrf == 'global'
      register: bgp_global_inject_result
      failed_when: bgp_global_inject_result.rc != 0

    - name: "[BGP_SESSION_DOWN] Verify BGP session is gone"
      shell: >
        docker exec {{ router }} vtysh -c "show bgp vrf {{ vrf }} summary" 2>/dev/null |
        grep "{{ peer_ip }}" || echo "session removed"
      when: failure_type == 'BGP_SESSION_DOWN'
      failed_when: false
      register: bgp_verify

    - name: "[BGP_SESSION_DOWN] Log verification"
      debug:
        msg: "[{{ failure_name }}] BGP session to {{ peer_ip }} status: {{ bgp_verify.stdout | trim }}"
      when: failure_type == 'BGP_SESSION_DOWN'

    # =========================================================================
    # PROCESS_CRASH
    # =========================================================================
    - name: "[PROCESS_CRASH] Save method as original state"
      set_fact:
        original_state:
          method: "{{ method }}"
          router: "{{ router }}"
      when: failure_type == 'PROCESS_CRASH'

    - name: "[PROCESS_CRASH] Kill bgpd process inside router container"
      shell: >
        docker exec {{ router }}
        /bin/sh -c "kill -9 \$(cat /var/run/frr/bgpd.pid 2>/dev/null || pgrep bgpd) 2>/dev/null || true"
      when: failure_type == 'PROCESS_CRASH' and method == 'process_kill'
      register: bgpd_kill_result
      failed_when: false

    - name: "[PROCESS_CRASH] Disable loopback interface on router container"
      shell: >
        docker exec {{ router }} ip link set lo down
      when: failure_type == 'PROCESS_CRASH' and method == 'loopback_disable'
      register: loopback_down_result
      failed_when: loopback_down_result.rc != 0

    - name: "[PROCESS_CRASH] Verify BGP sessions dropped (process_kill)"
      shell: >
        docker exec {{ router }} vtysh -c "show bgp summary" 2>/dev/null |
        grep -E "Active|Connect|Idle" | head -5 || echo "BGP not responding"
      when: failure_type == 'PROCESS_CRASH' and method == 'process_kill'
      failed_when: false
      register: bgp_crash_verify

    - name: "[PROCESS_CRASH] Verify loopback is down"
      shell: >
        docker exec {{ router }} ip link show lo | grep -o "DOWN\|UP"
      when: failure_type == 'PROCESS_CRASH' and method == 'loopback_disable'
      failed_when: false
      register: loopback_verify

    - name: "[PROCESS_CRASH] Log verification"
      debug:
        msg: "[{{ failure_name }}] PROCESS_CRASH method={{ method }} applied on {{ router }}"
      when: failure_type == 'PROCESS_CRASH'

    # =========================================================================
    # PACKET_CORRUPTION
    # =========================================================================
    - name: "[PACKET_CORRUPTION] Check for existing qdisc on interface"
      shell: >
        docker exec {{ router }} tc qdisc show dev {{ interface }} |
        grep -v "^qdisc noqueue" | grep -v "^qdisc mq" | grep -c "qdisc" || echo "0"
      when: failure_type == 'PACKET_CORRUPTION'
      register: existing_qdisc_check
      failed_when: false

    - name: "[PACKET_CORRUPTION] Save original state (including qdisc info)"
      set_fact:
        original_state:
          interface: "{{ interface }}"
          had_existing_qdisc: "{{ (existing_qdisc_check.stdout | trim | int) > 0 }}"
      when: failure_type == 'PACKET_CORRUPTION'

    - name: "[PACKET_CORRUPTION] Remove any existing root qdisc before applying netem"
      shell: >
        docker exec {{ router }} tc qdisc del dev {{ interface }} root 2>/dev/null || true
      when: failure_type == 'PACKET_CORRUPTION'
      failed_when: false

    - name: "[PACKET_CORRUPTION] Inject packet corruption/drop rate using tc netem"
      shell: >
        docker exec {{ router }}
        tc qdisc add dev {{ interface }} root netem corrupt {{ error_rate }} loss {{ error_rate }}
      when: failure_type == 'PACKET_CORRUPTION'
      register: tc_inject_result
      failed_when: tc_inject_result.rc != 0

    - name: "[PACKET_CORRUPTION] Verify tc qdisc was applied"
      shell: >
        docker exec {{ router }} tc qdisc show dev {{ interface }}
      when: failure_type == 'PACKET_CORRUPTION'
      register: tc_verify
      failed_when: false

    - name: "[PACKET_CORRUPTION] Log verification"
      debug:
        msg: "[{{ failure_name }}] tc qdisc on {{ router }}/{{ interface }}: {{ tc_verify.stdout | trim }}"
      when: failure_type == 'PACKET_CORRUPTION'

    # =========================================================================
    # LINK_DOWN
    # Two sub-modes:
    #   interface mode (link_down_mode == 'interface'):
    #     Brings down the interface inside the router container via docker exec.
    #     Only the local router sees an immediate L1/L2 down event.
    #   bridge mode (link_down_mode == 'bridge'):
    #     Brings down the Linux bridge on the host that connects two routers.
    #     Both ends see an immediate carrier-loss event simultaneously.
    # =========================================================================

    # --- Interface mode ---
    - name: "[LINK_DOWN/interface] Save original state"
      set_fact:
        original_state:
          mode: "interface"
          interface: "{{ interface }}"
          router: "{{ router }}"
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'interface'

    - name: "[LINK_DOWN/interface] Bring interface down inside router container"
      shell: >
        docker exec {{ router }} ip link set {{ interface }} down
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'interface'
      register: link_down_iface_result
      failed_when: link_down_iface_result.rc != 0

    - name: "[LINK_DOWN/interface] Verify interface is down"
      shell: >
        docker exec {{ router }} ip link show {{ interface }} | grep -o "DOWN\|UP"
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'interface'
      register: link_iface_verify
      failed_when: false

    - name: "[LINK_DOWN/interface] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] Interface {{ router }}/{{ interface }} state:
          {{ link_iface_verify.stdout | trim }}
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'interface'

    # --- Bridge mode ---
    - name: "[LINK_DOWN/bridge] Save original state"
      set_fact:
        original_state:
          mode: "bridge"
          bridge: "{{ bridge }}"
          router: "{{ router }}"
          peer_router: "{{ peer_router }}"
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'bridge'

    - name: "[LINK_DOWN/bridge] Bring Linux bridge down on host"
      shell: >
        ip link set {{ bridge }} down
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'bridge'
      register: link_down_bridge_result
      failed_when: link_down_bridge_result.rc != 0

    - name: "[LINK_DOWN/bridge] Verify bridge is down"
      shell: >
        ip link show {{ bridge }} | grep -o "DOWN\|UP"
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'bridge'
      register: link_bridge_verify
      failed_when: false

    - name: "[LINK_DOWN/bridge] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] Bridge {{ bridge }} ({{ router }} ↔ {{ peer_router }}) state:
          {{ link_bridge_verify.stdout | trim }}
      when: failure_type == 'LINK_DOWN' and link_down_mode == 'bridge'

    # =========================================================================
    # OSPF_AREA_MISMATCH
    # =========================================================================
    - name: "[OSPF_AREA_MISMATCH] Save correct area as original state"
      set_fact:
        original_state:
          interface: "{{ interface }}"
          correct_area: "{{ correct_area }}"
          wrong_area: "{{ wrong_area }}"
      when: failure_type == 'OSPF_AREA_MISMATCH'

    - name: "[OSPF_AREA_MISMATCH] Remove interface from correct OSPF area"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "interface {{ interface }}" \
          -c "no ip ospf area {{ correct_area }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'OSPF_AREA_MISMATCH'
      register: ospf_remove_result
      failed_when: ospf_remove_result.rc != 0

    - name: "[OSPF_AREA_MISMATCH] Assign interface to wrong OSPF area"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "interface {{ interface }}" \
          -c "ip ospf area {{ wrong_area }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'OSPF_AREA_MISMATCH'
      register: ospf_inject_result
      failed_when: ospf_inject_result.rc != 0

    - name: "[OSPF_AREA_MISMATCH] Verify OSPF neighbor state (should be degraded)"
      shell: >
        docker exec {{ router }} vtysh -c "show ip ospf neighbor" 2>/dev/null |
        grep -E "Full|2-Way|ExStart|Exchange|Loading|Init|Down" | head -10 ||
        echo "No OSPF neighbors found"
      when: failure_type == 'OSPF_AREA_MISMATCH'
      register: ospf_verify
      failed_when: false

    - name: "[OSPF_AREA_MISMATCH] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] OSPF area on {{ router }}/{{ interface }} changed from
          {{ correct_area }} to {{ wrong_area }}. Neighbor states: {{ ospf_verify.stdout | trim }}
      when: failure_type == 'OSPF_AREA_MISMATCH'

    # =========================================================================
    # DUPLICATE_IP
    # =========================================================================
    - name: "[DUPLICATE_IP] Save duplicate IP as original state"
      set_fact:
        original_state:
          interface: "{{ interface }}"
          duplicate_ip: "{{ duplicate_ip }}"
      when: failure_type == 'DUPLICATE_IP'

    - name: "[DUPLICATE_IP] Add duplicate IP address to target interface"
      shell: >
        docker exec {{ router }} ip addr add {{ duplicate_ip }} dev {{ interface }}
      when: failure_type == 'DUPLICATE_IP'
      register: dup_ip_result
      failed_when: dup_ip_result.rc != 0

    - name: "[DUPLICATE_IP] Verify duplicate IP was added"
      shell: >
        docker exec {{ router }} ip addr show {{ interface }} | grep "{{ duplicate_ip.split('/')[0] }}"
      when: failure_type == 'DUPLICATE_IP'
      register: dup_ip_verify
      failed_when: false

    - name: "[DUPLICATE_IP] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] Duplicate IP {{ duplicate_ip }} added to
          {{ router }}/{{ interface }}: {{ dup_ip_verify.stdout | trim }}
      when: failure_type == 'DUPLICATE_IP'

    # =========================================================================
    # TXQUEUE_STARVATION
    # Fault 8: Shrink Linux txqueuelen on a router interface to cause constant
    # queue overflow under load. This is a kernel parameter — invisible to VyOS
    # config, GitOps, and all configuration management systems.
    # Only supported in direct injection mode.
    # =========================================================================
    - name: "[TXQUEUE_STARVATION] Read current txqueuelen from router interface"
      shell: >
        docker exec {{ router }}
        ip link show {{ interface }} | awk '/qlen/ {for(i=1;i<=NF;i++) if ($i=="qlen") print $(i+1)}'
      register: current_qlen_result
      when: failure_type == 'TXQUEUE_STARVATION'
      failed_when: false

    - name: "[TXQUEUE_STARVATION] Save original txqueuelen as Ansible fact"
      set_fact:
        original_state:
          interface: "{{ interface }}"
          original_queue_length: "{{ current_qlen_result.stdout | trim | default('1000') | int }}"
      when: failure_type == 'TXQUEUE_STARVATION'

    - name: "[TXQUEUE_STARVATION] Set txqueuelen to starvation value via ip link"
      shell: >
        docker exec {{ router }}
        ip link set {{ interface }} txqueuelen {{ queue_length | default(20) }}
      when: failure_type == 'TXQUEUE_STARVATION'
      register: txqueue_inject_result
      failed_when: txqueue_inject_result.rc != 0

    - name: "[TXQUEUE_STARVATION] Verify txqueuelen was applied"
      shell: >
        docker exec {{ router }}
        ip link show {{ interface }} | awk '/qlen/ {for(i=1;i<=NF;i++) if ($i=="qlen") print $(i+1)}'
      register: verify_qlen
      when: failure_type == 'TXQUEUE_STARVATION'
      failed_when: false

    - name: "[TXQUEUE_STARVATION] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] txqueuelen on {{ router }}/{{ interface }} is now
          {{ verify_qlen.stdout | trim }} (target: {{ queue_length | default(20) }},
          original: {{ original_state.original_queue_length }}).
          NOTE: This kernel parameter is invisible to VyOS config and all config management systems.
      when: failure_type == 'TXQUEUE_STARVATION'

    # =========================================================================
    # OSPF_COST_INFLATION
    # Fault 9: Set OSPF interface cost to 65535 on a core link. The OSPF
    # adjacency remains Full — cost changes never break adjacencies. All traffic
    # reroutes via longer detour paths. Cost 65535 is a legal configured value
    # that generates no alarms from any traditional monitoring system.
    # Supports both direct and operator injection modes.
    # =========================================================================
    - name: "[OSPF_COST_INFLATION] Read current OSPF cost from router interface"
      shell: >
        docker exec {{ router }}
        vtysh -c "show ip ospf interface {{ interface }}" 2>/dev/null |
        awk '/Cost:/ {print $2}' | head -1
      register: current_ospf_cost_result
      when: failure_type == 'OSPF_COST_INFLATION'
      failed_when: false

    - name: "[OSPF_COST_INFLATION] Save original OSPF cost as Ansible fact"
      set_fact:
        original_state:
          interface: "{{ interface }}"
          original_ospf_cost: "{{ current_ospf_cost_result.stdout | trim | default('1') | int }}"
      when: failure_type == 'OSPF_COST_INFLATION'

    - name: "[OSPF_COST_INFLATION] Set OSPF interface cost to inflated value via vtysh"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "interface {{ interface }}" \
          -c "ip ospf cost {{ ospf_cost | default(65535) }}" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'OSPF_COST_INFLATION'
      register: ospf_cost_inject_result
      failed_when: ospf_cost_inject_result.rc != 0

    - name: "[OSPF_COST_INFLATION] Verify OSPF cost was applied"
      shell: >
        docker exec {{ router }}
        vtysh -c "show ip ospf interface {{ interface }}" 2>/dev/null |
        awk '/Cost:/ {print $2}' | head -1
      register: verify_ospf_cost
      when: failure_type == 'OSPF_COST_INFLATION'
      failed_when: false

    - name: "[OSPF_COST_INFLATION] Verify OSPF adjacency still Full (cost change must not break adjacency)"
      shell: >
        docker exec {{ router }}
        vtysh -c "show ip ospf neighbor {{ interface }}" 2>/dev/null |
        grep -E "Full|2-Way" | head -5 || echo "Checking adjacency state..."
      register: ospf_adj_verify
      when: failure_type == 'OSPF_COST_INFLATION'
      failed_when: false

    - name: "[OSPF_COST_INFLATION] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] OSPF cost on {{ router }}/{{ interface }} is now
          {{ verify_ospf_cost.stdout | trim }} (target: {{ ospf_cost | default(65535) }},
          original: {{ original_state.original_ospf_cost }}).
          Adjacency state: {{ ospf_adj_verify.stdout | trim }}.
          NOTE: Cost 65535 is a legal value — no alarms will fire from traditional monitoring.
      when: failure_type == 'OSPF_COST_INFLATION'

    # =========================================================================
    # VRF_RT_MISCONFIGURATION
    # Fault 4 variant: Change the import Route Target on a PE router VRF to a
    # non-matching community. The PE no longer imports hub routes, silently
    # isolating the attached spoke site. All BGP sessions remain Established.
    # Zero alarms. Supports both direct and operator injection modes.
    # =========================================================================
    - name: "[VRF_RT_MISCONFIGURATION] Save correct RT as original state"
      set_fact:
        original_state:
          vrf: "{{ vrf }}"
          correct_rt: "{{ correct_rt }}"
          wrong_rt: "{{ wrong_rt }}"
      when: failure_type == 'VRF_RT_MISCONFIGURATION'

    - name: "[VRF_RT_MISCONFIGURATION] Remove correct RT import from VRF"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "router bgp 65001 vrf {{ vrf }}" \
          -c "no address-family ipv4 unicast" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'VRF_RT_MISCONFIGURATION'
      register: rt_remove_result
      failed_when: false

    - name: "[VRF_RT_MISCONFIGURATION] Apply wrong RT import to VRF via VyOS"
      shell: |
        docker exec {{ router }} vtysh \
          -c "configure terminal" \
          -c "router bgp 65001 vrf {{ vrf }}" \
          -c "address-family ipv4 unicast" \
          -c "no route-target import {{ correct_rt }}" \
          -c "route-target import {{ wrong_rt }}" \
          -c "exit" \
          -c "exit" \
          -c "exit"
      when: failure_type == 'VRF_RT_MISCONFIGURATION'
      register: rt_inject_result
      failed_when: rt_inject_result.rc != 0

    - name: "[VRF_RT_MISCONFIGURATION] Verify VRF route table is now empty (hub routes gone)"
      shell: >
        docker exec {{ router }}
        vtysh -c "show bgp vrf {{ vrf }} ipv4 unicast" 2>/dev/null |
        grep -c "^*" || echo "0"
      register: vrf_route_count
      when: failure_type == 'VRF_RT_MISCONFIGURATION'
      failed_when: false

    - name: "[VRF_RT_MISCONFIGURATION] Log verification"
      debug:
        msg: >
          [{{ failure_name }}] RT import on {{ router }} VRF {{ vrf }} changed from
          {{ correct_rt }} to {{ wrong_rt }}.
          VRF route count: {{ vrf_route_count.stdout | trim }} (expected: 0 hub routes).
          NOTE: All BGP sessions remain Established — zero alarms will fire.
      when: failure_type == 'VRF_RT_MISCONFIGURATION'

    # =========================================================================
    # Final summary
    # =========================================================================
    - name: Log injection completion
      debug:
        msg: >
          [{{ failure_name }}] Fault '{{ failure_type }}' successfully injected on router
          '{{ router }}'. original_state={{ original_state }}
