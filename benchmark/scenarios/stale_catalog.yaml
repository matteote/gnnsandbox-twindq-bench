name: stale_catalog
description: >
  Catalog has stale and incomplete inventory; telemetry is fresh and accurate.
  Tests completeness and accuracy detection on the catalog side.

seed: 42

inputs:
  golden_twin: benchmark/examples/golden_twin/l3vpn-hub-spoke.json

outputs:
  root: benchmark/out/stale_catalog/
  catalog_dir: benchmark/out/stale_catalog/catalog/
  telemetry_path: benchmark/out/stale_catalog/telemetry.json
  ledger_path: benchmark/out/stale_catalog/defect_ledger.jsonl

defects:
  - id: cat_missing_pe_routers
    class: completeness.missing_node
    target_projection: catalog
    target_entity_type: PhysicalRouter
    selection:
      mode: random_rate
      rate: 0.10
      filter:
        role: ["PE", "P"]

  - id: cat_attribute_drift_vendor
    class: accuracy.attribute_drift
    target_projection: catalog
    target_entity_type: PhysicalRouter
    selection:
      mode: random_rate
      rate: 0.20
    parameters:
      attribute: vendor
      drift_table: ["Cisco", "Juniper", "Nokia"]

  - id: cat_missing_interface_attr
    class: completeness.missing_attribute
    target_projection: catalog
    target_entity_type: PhysicalInterface
    selection:
      mode: random_rate
      rate: 0.15
    parameters:
      attribute: mac_address
