- name: Create network directory
  file:
    path: /opt/network-repo
    state: directory
    owner: git
    group: git
    mode: 0775

- name: init git repo
  command: sudo -u git git init
  args:
    chdir: /opt/network-repo

- name: configure git user name
  command: "sudo -u git git config --global user.name 'Network Agent'"
  args:
    chdir: /opt/network-repo

- name: configure git email
  command: "sudo -u git git config --global user.email 'networkagent@example.com'"
  args:
    chdir: /opt/network-repo

###############################################
# Master Branch
###############################################
- name: checkout master branch
  command: sudo -u git git checkout -B master
  args:
    chdir: /opt/network-repo

- name: push network files to master
  ansible.builtin.copy:
    src: "{{item}}"
    dest: "/opt/network-repo/{{item}}"
    owner: git
    group: git
    mode: '0644'
  loop:
   - Readme.md

- name: add to master branch in network repo
  command: sudo -u git git add .
  args:
    chdir: /opt/network-repo

- name: initial commit 
  command: sudo -u git git commit -m "initial commit"
  args:
    chdir: /opt/network-repo

- name: add remote repo
  command: sudo -u git git remote add origin https://{{ lookup('env', 'WEBAPPS_LOGIN') }}:{{ lookup('env', 'WEBAPPS_PWD') }}@{{external_ip_address}}:3000/{{ lookup('env', 'WEBAPPS_LOGIN') }}/network.git
  args:
    chdir: /opt/network-repo

- name: push to repo
  command: sudo -u git git -c http.sslVerify=false push -u origin master
  args:
    chdir: /opt/network-repo

###############################################
# Core Branch
###############################################
- name: checkout core branch
  command: sudo -u git git checkout -B core
  args:
    chdir: /opt/network-repo

- name: push network files
  ansible.builtin.copy:
    src: "{{item}}"
    dest: "/opt/network-repo/{{item}}"
    owner: git
    group: git
    mode: '0644'
  loop:
   - Readme.md
   - userplanefunction-upf.yaml
   - datanetwork-dnn.yaml
   - controlplane-controlplane.yaml

- name: push templated network files
  ansible.builtin.template:
    src: "{{item}}"
    dest: "/opt/network-repo/{{item}}"
    owner: git
    group: git
    mode: '0644'
  loop: 
   - core-network-location.yaml
   - internet-network-location.yaml

- name: add to core branch in network repo
  command: sudo -u git git add .
  args:
    chdir: /opt/network-repo

- name: network files commit 
  command: sudo -u git git commit -m "add core files"
  args:
    chdir: /opt/network-repo

- name: push to repo
  command: sudo -u git git -c http.sslVerify=false push -u origin core
  args:
    chdir: /opt/network-repo


