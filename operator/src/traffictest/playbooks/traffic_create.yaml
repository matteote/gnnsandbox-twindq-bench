---
- name: Traffic Test Management
  hosts: all
  become: true
  gather_facts: yes
  vars:
    # === Paths on host VM (host)
    # global files
    #traffic_generator_file: "/tmp/traffic_generator.py"
    #metrics_collector_file: "/tmp/metrics_collector.py"
    #start_traffic_test_file: "/tmp/start_traffic_test.sh"
    # per test files
    traffic_script_dir: "/tmp/traffic_test_{{ test_name | default('unknown') }}_{{ dest_port }}"
    traffic_generator_file: "{{ traffic_script_dir }}/traffic_generator.py"
    metrics_collector_file: "{{ traffic_script_dir }}/metrics_collector.py"
    start_traffic_test_file: "{{ traffic_script_dir }}/start_traffic_test.sh"
    stop_traffic_test_file: "{{ traffic_script_dir }}/stop_traffic_test.sh"
    is_traffic_test_running_file: "{{ traffic_script_dir }}/is_traffic_test_running.sh"
    config_file: "{{ traffic_script_dir }}/config_{{ dest_port }}.json"
    results_file: "{{ traffic_script_dir }}/results.json"
    pid_file: "{{ traffic_script_dir }}/traffic_test.pid"
    log_file: "{{ traffic_script_dir }}/traffic_test.log"
    exit_code_file:  "{{ traffic_script_dir }}/exit_code"
    iperf_server_log_file: "{{ traffic_script_dir }}/iperf3_server.log"


  tasks:
    - name: Debug operation
      debug:
        msg: "Operation: {{ operation }}, Source: {{ source_device }}, Dest: {{ destination_device }}"

    - name: Create pristine traffic test directory on the host VM
      shell: "rm -rf {{ traffic_script_dir }} && mkdir -p {{ traffic_script_dir }} && chmod 755 {{ traffic_script_dir}}"

    - name: Copy all files in templates directory to traffic_script_dir
      template:
        src: "{{ item }}"
        dest: "{{ traffic_script_dir }}/{{ item | basename }}"
      loop: "{{ query('fileglob', 'templates/*') }}"

    - name: Create traffic test configuration
      copy:
        content: |
          {
            "test_name": "{{ test_name | default('unknown') }}",
            "source_device": "{{ source_device }}",
            "source_ip": "{{ source_ip }}",
            "destination_device": "{{ destination_device }}",
            "destination_ip": "{{ destination_ip }}",
            "protocol": "{{ protocol }}",
            "port": {{ dest_port | int }},
            "duration": {{ duration | int }},
            "bandwidth": "{{ bandwidth }}",
            "pattern_type": "{{ pattern_type }}",
            "pattern_config": {{ pattern_config | default({}) | to_json }},
            "concurrent_users": {{ concurrent_users | int }},
            "session_duration": {% if session_duration is defined and session_duration != '' and session_duration != 'null' %}{{ session_duration | int }}{% else %}null{% endif %},
            "think_time": {{ think_time | int }},
            "metrics_enabled": {{ metrics_enabled | default(true) | lower }},
            "metrics_interval": {{ metrics_interval | int }}
          }
        dest: "{{ config_file }}"
        mode: '0644'


    # ==== DESTINATION CONTAINER OPERATIONS ====
    - name: Info logging
      debug:
        msg: "RUNNING DESTINATION CONTAINER OPERATIONS on {{ destination_device }}"

    - name: Copy traffic test directory to destination container
      shell: "docker cp {{ traffic_script_dir }} {{ destination_device }}:{{ traffic_script_dir }}"
      failed_when: false

    - name: Check if traffic test is running on destination container
      shell: "docker exec {{ destination_device }} sh {{ is_traffic_test_running_file }} {{ destination_ip }} {{ dest_port }} destination"
      register: server_check
      failed_when: false

    # - name: Skip traffic test starting operations if traffic test is already running on destination container
    #   meta: end_play
    #   when: server_check.stdout == "running"

    - block:
      - name: Start iperf server on destination device
        shell: "docker exec {{ destination_device }} sh {{ traffic_script_dir }}/start_traffic_test.sh {{ destination_ip }} {{ dest_port }} destination"
        register: server_start
        failed_when: false

      - name: Verify iperf server is running on destination device
        shell: |
          docker exec {{ destination_device }} sh {{ is_traffic_test_running_file }} {{ destination_ip }} {{ dest_port }} destination
        register: iperf3_server_check
        retries: 5
        delay: 3
        failed_when: false
      when: server_check.stdout == "not_running"


    # ==== SOURCE CONTAINER OPERATIONS ====
    - name: Info logging
      debug:
        msg: "RUNNING SOURCE CONTAINER OPERATIONS on {{ source_device }}"

    - name: Delete existing traffic test directory on source container
      shell: "docker exec {{ source_device }} rm -rf {{ traffic_script_dir }} && mkdir -p {{ traffic_script_dir }}"
      failed_when: false

    - name: Copy traffic test directory to source container
      shell: "docker cp {{ traffic_script_dir }} {{ source_device }}:{{ traffic_script_dir }}"
      failed_when: false

    # - name: Verify wrapper script exists
    #   stat:
    #     path: "{{ start_traffic_test_file }}"
    #   register: wrapper_script_stat

    # - name: Copy wrapper script to source container
    #   shell: "docker cp {{ start_traffic_test_file }} {{ source_device }}:{{ start_traffic_test_file }}"
    #   when: wrapper_script_stat.stat.exists

    # - name: Debug iperf3 server status
    #   debug:
    #     msg: "iperf3 server check result: {{ iperf3_server_check.stdout }}, return code: {{ iperf3_server_check.rc }}"

    # - name: Ensure destination dir exists in source container
    #   shell: "docker exec {{ source_device }} mkdir -p {{ traffic_script_dir }}"
    #   failed_when: false

    # - name: Ensure destination dir exists in destination container
    #   shell: "docker exec {{ destination_device }} mkdir -p {{ traffic_script_dir }}"
    #   failed_when: false

    # - name: Verify traffic generator script exists
    #   stat:
    #     path: "{{ traffic_generator_file }}"
    #   register: traffic_gen_stat

    # - name: Copy traffic generator script to source container
    #   shell: "docker cp {{ traffic_generator_file }} {{ source_device }}:{{ guest_traffic_generator_file }}"
    #   when: traffic_gen_stat.stat.exists

    # - name: Copy traffic generator script to source container
    #   shell: "docker cp {{ traffic_generator_file }} {{ source_device }}:{{ traffic_generator_file }}"
    #   when: traffic_gen_stat.stat.exists

    # - name: Verify metrics collector script exists
    #   stat:
    #     path: "{{ metrics_collector_file }}"
    #   register: metrics_collector_stat

    # - name: Copy metrics collector script to source container
    #   shell: "docker cp {{ metrics_collector_file }} {{ source_device }}:{{ metrics_collector_file }}"
    #   when: metrics_collector_stat.stat.exists

    # - name: Verify configuration file exists
    #   stat:
    #     path: "{{ config_file }}"
    #   register: config_file_stat

    # - name: Copy configuration file to source container
    #   shell: "docker cp {{ config_file }} {{ source_device }}:{{ config_file }}"
    #   when: config_file_stat.exists

    - name: Start traffic generator on source container
      shell: "docker exec -d {{ source_device }} /bin/sh {{ start_traffic_test_file }} {{ destination_ip }} {{ dest_port }} source"
      failed_when: false

    - name: Wait for process to start
      pause:
        seconds: 2

    - name: Get traffic generator process ID for tracking
      shell: "docker exec {{ source_device }} cat {{ pid_file }} 2>/dev/null || echo ''"
      register: traffic_process
      failed_when: false

    - name: Save traffic generator process info
      copy:
        content: "{{ traffic_process.stdout }}"
        dest: "{{ pid_file }}"
      when: traffic_process.stdout != ""

