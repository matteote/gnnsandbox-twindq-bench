            "45": "5: messages generated internally by syslogd"
            "46": "5: messages generated internally by syslogd"
            "47": "5: messages generated internally by syslogd"
  service:
    pipelines:
      vyos_pipeline:
        receivers: [vyos_syslog]
        processors: [add_vyos_marker, vyos_parser, set_severity, set_facility]
