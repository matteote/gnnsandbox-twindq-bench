apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vyosl3vpns.google.dev
spec:
  group: google.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            VyOSL3VPN defines Layer 3 VPN services (VRFs, route targets, BGP VPN neighbors) for customer connectivity.
            
            DEPENDENCY: This resource requires a VyOSUnderlay to be in 'Ready' state before it can be applied.
            The operator will wait and retry (every 10 seconds) until the referenced underlay is ready.
            
            Dependency chain: VyOSInfrastructure → VyOSUnderlay → VyOSL3VPN
            
            Lifecycle phases:
            - Waiting: The referenced VyOSUnderlay is not yet ready
            - Processing: Applying L3VPN/VRF configuration to routers
            - Ready: All L3VPN services have been successfully configured
            - Error: Failed to apply configuration
          properties:
            spec:
              type: object
              required:
                - underlayRef
              properties:
                underlayRef:
                  type: string
                  description: |
                    Name of the VyOSUnderlay resource this L3VPN service is built on.
                    The operator will wait for this underlay to reach 'Ready' status before proceeding.
                    Example: 'l3vpn-hub-spoke-underlay'
                services:
                  type: array
                  description: "Global L3VPN service definitions for multi-site customer connectivity."
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        description: "Service type (e.g., l3vpn)"
                      topology:
                        type: string
                        description: "VPN topology (e.g., hub, spoke, any-to-any)"
                        enum: ["hub", "spoke", "any-to-any", "hub-spoke"]
                      rd:
                        type: string
                        pattern: '^[0-9]+:[0-9]+$'
                      rt_export:
                        type: string
                        pattern: '^[0-9]+:[0-9]+$'
                      rt_import:
                        type: string
                        pattern: '^[0-9]+:[0-9]+$'
                      description:
                        type: string
                routers:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      vrfs:
                        type: array
                        items:
                          type: object
                          required:
                            - name
                            - table
                          properties:
                            name:
                              type: string
                            table:
                              type: integer
                            rd:
                              type: string
                            rt_export:
                              type: array
                              items:
                                type: string
                            rt_import:
                              type: array
                              items:
                                type: string
                            description:
                              type: string
                            interfaces:
                              type: array
                              description: "List of interface names to assign to this VRF"
                              items:
                                type: string
                                description: "Interface name (e.g., eth2)"
                      bgp:
                        type: object
                        properties:
                          vrfs:
                            type: array
                            items:
                              type: object
                              required:
                                - name
                              properties:
                                name:
                                  type: string
                                neighbors:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - peer
                                      - remote_as
                                    properties:
                                      peer:
                                        type: string
                                      remote_as:
                                        type: integer
                                      description:
                                        type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Underlay
          type: string
          jsonPath: .spec.underlayRef
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  names:
    kind: VyOSL3VPN
    plural: vyosl3vpns
    singular: vyosl3vpn
    shortNames:
      - l3vpn
  scope: Namespaced
