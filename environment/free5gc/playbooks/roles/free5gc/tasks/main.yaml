- name: check if build dir exists
  ansible.builtin.stat:
    path: /opt/free5gc
  register: free5gc_build

- name: copy build dir
  ansible.builtin.copy: 
    src: free5gc
    dest: /opt
  when: free5gc_build.stat.exists == False

- name: copy Makefile
  ansible.builtin.template: 
    src: Makefile
    dest: /opt/free5gc
  when: free5gc_build.stat.exists == False

- name: check if src exists
  ansible.builtin.stat:
    path: /opt/free5gc/base/free5gc
  register: free5gc_src

- name: clone free5gc src
  command: "git clone -b v3.3.0 --recursive https://github.com/free5gc/free5gc.git"
  args:
    chdir: /opt/free5gc/base
  when: free5gc_src.stat.exists == False

# authenticate with the artefact repo by using service account method
# https://cloud.google.com/artifact-registry/docs/docker/authentication#json-key
- name: copy the networkagent.json key
  ansible.builtin.copy: 
    src: ./networkagent.json
    dest: /opt

- name: authenticate with the artefact repo
  raw: "cat /opt/networkagent.json | docker login -u _json_key --password-stdin https://{{GOOGLE_REGION}}-docker.pkg.dev"

- name: make free5gc images
  command: "make all"
  args:
    chdir: /opt/free5gc

- name: pull mongodb
  command: "docker pull mongo"

- name: push images to artifact repo
  command: "docker push {{GOOGLE_REGION}}-docker.pkg.dev/{{GOOGLE_PROJECT}}/networkagent/{{item}}:latest"
  loop:
   - smf
   - amf
   - upf
   - udr
   - udm
   - nrf
   - nssf
   - n3iwf
   - pcf
   - ausf
   - webconsole
   - ueransim
