---
- name: Traffic Test Management
  hosts: all
  become: true
  gather_facts: yes
  vars:
    # === Paths on host VM (host)
    # global files
    #traffic_generator_file: "/tmp/traffic_generator.py"
    #metrics_collector_file: "/tmp/metrics_collector.py"
    #start_traffic_test_file: "/tmp/start_traffic_test.sh"
    # per test files
    traffic_script_dir: "/tmp/traffic_test_{{ test_name | default('unknown') }}_{{ dest_port }}"
    traffic_generator_file: "{{ traffic_script_dir }}/traffic_generator.py"
    metrics_collector_file: "{{ traffic_script_dir }}/metrics_collector.py"
    start_traffic_test_file: "{{ traffic_script_dir }}/start_traffic_test.sh"
    stop_traffic_test_file: "{{ traffic_script_dir }}/stop_traffic_test.sh"
    is_traffic_test_running_file: "{{ traffic_script_dir }}/is_traffic_test_running.sh"
    config_file: "{{ traffic_script_dir }}/config.json"
    results_file: "{{ traffic_script_dir }}/results.json"
    pid_file: "{{ traffic_script_dir }}/traffic_test.pid"
    log_file: "{{ traffic_script_dir }}/traffic_test.log"
    exit_code_file:  "{{ traffic_script_dir }}/exit_code"
    iperf_server_log_file: "{{ traffic_script_dir }}/iperf3_server.log"


  tasks:
    - name: Debug operation
      debug:
        msg: "Operation: {{ operation }}, Source: {{ source_device }}, Dest: {{ destination_device }}"

    #########################################################################
    # DELETE OPERATION
    #########################################################################
  
    - name: Stop traffic test on source container
      shell: |
        docker exec {{ source_device }} sh {{ stop_traffic_test_file }} {{ destination_ip }} {{ dest_port }} source
      failed_when: false

    # - name: Stop local monitoring process
    #   shell: |
    #     if [ -f "{{ pid_file }}" ]; then
    #       PID=$(cat {{ pid_file }})
    #       if kill -0 $PID 2>/dev/null; then
    #         kill $PID
    #         sleep 5
    #         kill -9 $PID 2>/dev/null || true
    #       fi
    #       rm -f {{ pid_file }}
    #     fi
    #   failed_when: false

    # - name: Stop results monitoring process
    #   shell: "pkill -f 'monitor_results.sh' || true"
    #   failed_when: false

    - name: Stop iperf3 server on destination device
      shell: "docker exec {{ destination_device }} sh {{ stop_traffic_test_file }} {{ destination_ip }} {{ dest_port }} destination || true"
      failed_when: false

    - name: Stop all traffic test processes on source device
      shell: "docker exec {{ destination_device }} sh {{ stop_traffic_test_file }} {{ destination_ip }} {{ dest_port }} source || true"
      failed_when: false

    - name: Collect final results if available
      shell: |
        if [ -f "{{ results_file }}" ]; then
          cat {{ results_file }}
        else
          echo '{"message": "No results file found", "completed": false}'
        fi
      register: final_results
      failed_when: false

    - name: Clean up traffic test directory from destination container
      shell: |
        docker exec {{ destination_device }} rm -rf {{ traffic_script_dir }} || true
      failed_when: false

    - name: Clean up traffic test directory from source container
      shell: |
        docker exec {{ source_device }} rm -rf {{ traffic_script_dir }} || true
      failed_when: false

    - name: Clean up traffic test directory on host VM
      file:
        path: "{{ traffic_script_dir }}"
        state: absent
      failed_when: false

    - name: Set deletion facts
      set_fact:
        end_time: "{{ end_time }}"
        status: "Deleted"
        message: "Traffic test stopped and cleaned up"
        final_results: "{{ final_results.stdout | default('{}') }}"

    #########################################################################
    # FINAL RESULT
    #########################################################################
    
    - name: Return operation result
      debug:
        msg: "Operation {{ operation }} completed successfully"
