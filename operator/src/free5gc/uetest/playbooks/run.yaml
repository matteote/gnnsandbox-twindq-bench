- hosts: all
  become: True
  gather_facts: True
  tasks:

  - name: copy uetest 
    ansible.builtin.copy: 
      src: run_test.py
      dest: /opt/run_test.py
      mode: 0777

  - debug:
      var: TEST_URL

  - name: run test in background
    ansible.builtin.shell:
      cmd: "nohup python3 /opt/run_test.py > /opt/test.log 2>&1 &"
    args:
      chdir: /opt
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: "/opt/networkagent.json"
      TEST_URL: "{{TEST_URL}}"
      USERID: "{{IMSI}}"
      VMNAME: "{{VMNAME}}"
    async: 15 # A short async timeout is fine here as nohup and '&' handle the backgrounding
    poll: 0 # Tell Ansible to start and move on immediately


