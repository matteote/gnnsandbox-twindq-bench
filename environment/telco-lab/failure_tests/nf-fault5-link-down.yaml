# NetworkFailure: Physical Link Disconnection / Cable Pull
#
# Fault Type   : LINK_DOWN
# Target       : P1, interface eth1 (P1-to-P2 core link)
# Impact       : Immediate L1/L2 down event on the P1-P2 link. Both P1 and P2
#                detect the interface as down. OSPF withdraws the link LSA,
#                triggering shortest-path recalculation. LDP tears down the LSP
#                on this segment. Traffic is rerouted via P1-P3-P4-P2 path.
#                Total blackout is brief (subsecond to a few seconds depending
#                on OSPF and LDP convergence timers).
#
# GNN Detection Signatures:
#   D-GAT  : Directed edge P1(eth1) → P2(eth1) immediately flips to link_state=0
#   STGNN  : Simultaneous OSPF SPF recalculation burst on all P-routers and RRs
#   HetGNN : Physical layer sub-embedding of both P1/eth1 and P2/eth1 flips to DOWN
#
# Note: Only P1's eth1 is brought down here. P2's eth1 will also detect link-down
# due to the physical (simulated) cable removal, but this playbook only acts on P1.
# The link can be restored by deleting this NetworkFailure resource.
#
# Usage:
#   kubectl apply  -f nf-fault5-link-down.yaml    # Pull the cable (link down)
#   kubectl delete -f nf-fault5-link-down.yaml    # Restore the cable (link up)
---
apiVersion: google.dev/v1
kind: NetworkFailure
metadata:
  name: fault5-link-down
  namespace: default
  labels:
    scenario: l3vpn-hub-spoke
    fault-type: link-down
    severity: high
spec:
  failureType: LINK_DOWN
  infrastructureRef: l3vpn-hub-spoke-infra
  target:
    router: p1
    # eth1 is the P1-to-P2 provider core link (VLAN 301, 172.16.30.0/24).
    # Bringing this interface down simulates a physical cable pull or port failure.
    interface: eth1
