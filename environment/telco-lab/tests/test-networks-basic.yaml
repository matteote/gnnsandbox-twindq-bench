---
# Basic Linux Network Test Configuration
# This creates simple networks to test bridge state monitoring
#
# Usage:
#   kubectl apply -f test-networks-basic.yaml
#   kubectl get linuxnetwork -n automation
#   kubectl describe linuxnetwork test-network-1 -n automation

apiVersion: google.dev/v1
kind: LinuxNetwork
metadata:
  name: test-network-1
  namespace: automation
  labels:
    test: bridge-monitoring
    purpose: basic
spec:
  name: test-net-1
  source_network: test
  network_type: multi-access
  gateway: 10.100.1.1
  bandwidth: 1gbit

---
apiVersion: google.dev/v1
kind: LinuxNetwork
metadata:
  name: test-network-2
  namespace: automation
  labels:
    test: bridge-monitoring
    purpose: basic
spec:
  name: test-net-2
  source_network: test
  network_type: multi-access
  gateway: 10.100.2.1
  bandwidth: 100mbit

---
apiVersion: google.dev/v1
kind: LinuxNetwork
metadata:
  name: test-network-3
  namespace: automation
  labels:
    test: bridge-monitoring
    purpose: veth-testing
spec:
  name: test-net-3
  source_network: test
  network_type: multi-access
  gateway: 10.100.3.1
  bandwidth: 10gbit
