---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: internet
  labels:
    graph: "true"
spec:
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: internet
  labels:
    graph: "true"
spec:
  ipCidrRange: 172.168.0.0/16
  region: "{{GOOGLE_REGION}}"
  description: internet DNN Network
  networkRef:
    name: internet
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeFirewall
metadata:
  name: internet
  labels:
    graph: "true"
spec:
  allow:
    - protocol: all
  networkRef:
    name: internet
  sourceRanges:
    - 0.0.0.0/0
