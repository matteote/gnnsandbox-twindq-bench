publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  graphview: ^1.2.0
  google_maps_flutter: ^2.14.0
  google_maps_flutter_web: ^0.5.14+3
  provider: ^6.1.4
  socket_io_client: ^3.1.1
