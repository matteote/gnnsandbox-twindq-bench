# Example TrafficTest configurations demonstrating different traffic patterns
# These examples show how to use the TrafficTest resource for ML training data generation

---
# Basic constant traffic test
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: constant-baseline
  namespace: default
  labels:
    scenario: baseline
    pattern: constant
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 300  # 5 minutes
  bandwidth: 50Mbps
  pattern_type: constant
  concurrent_users: 10
  metrics_enabled: true
  metrics_interval: 5

---
# Daily usage pattern simulation
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: daily-usage-pattern
  namespace: default
  labels:
    scenario: daily-cycle
    pattern: periodic
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 3600  # 1 hour (representing 24 hours compressed)
  pattern_type: periodic
  pattern_config:
    wave_type: sine
    period: 3600  # 1 hour cycle
    base_rate: 20Mbps
    amplitude: 30Mbps  # oscillates between 20±30 Mbps (0-50 Mbps range)
  concurrent_users: 25
  session_duration: 120  # 2 minute sessions
  think_time: 5
  metrics_enabled: true
  metrics_interval: 10

---
# Business hours burst pattern
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: business-hours-burst
  namespace: default
  labels:
    scenario: business-hours
    pattern: burst
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 1800  # 30 minutes
  pattern_type: burst
  pattern_config:
    burst_duration: 180    # 3 minute bursts (representing busy periods)
    burst_interval: 600    # every 10 minutes
    burst_rate: 100Mbps    # high traffic during business hours
    idle_rate: 5Mbps       # low traffic during off-hours
  concurrent_users: 50
  session_duration: 90
  think_time: 2
  metrics_enabled: true
  metrics_interval: 5

---
# Realistic user arrival pattern (Poisson)
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: realistic-user-arrivals
  namespace: default
  labels:
    scenario: user-simulation
    pattern: poisson
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 900  # 15 minutes
  bandwidth: 10Mbps  # per-user bandwidth
  pattern_type: poisson
  pattern_config:
    arrival_rate: 2.0  # 2 users per second average
  concurrent_users: 100  # maximum concurrent users
  session_duration: 300  # 5 minute average session
  think_time: 3
  metrics_enabled: true
  metrics_interval: 5

---
# High-frequency square wave for congestion testing
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: congestion-square-wave
  namespace: default
  labels:
    scenario: congestion-test
    pattern: periodic
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 600  # 10 minutes
  pattern_type: periodic
  pattern_config:
    wave_type: square
    period: 120  # 2 minute cycles
    base_rate: 40Mbps
    amplitude: 40Mbps  # alternates between 0-80 Mbps
  concurrent_users: 30
  metrics_enabled: true
  metrics_interval: 2  # High frequency sampling for congestion analysis

---
# UDP traffic test for jitter analysis
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: udp-jitter-test
  namespace: default
  labels:
    scenario: jitter-analysis
    pattern: constant
    protocol: udp
spec:
  source_device: test1
  destination_device: test2
  protocol: UDP
  port: 5201
  duration: 300  # 5 minutes
  bandwidth: 30Mbps
  pattern_type: constant
  concurrent_users: 5
  metrics_enabled: true
  metrics_interval: 1  # High frequency for jitter measurement

---
# Sawtooth pattern for gradual load increase
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: gradual-load-increase
  namespace: default
  labels:
    scenario: load-ramp
    pattern: periodic
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 900  # 15 minutes
  pattern_type: periodic
  pattern_config:
    wave_type: sawtooth
    period: 300  # 5 minute ramp cycles
    base_rate: 25Mbps
    amplitude: 25Mbps  # ramps from 0 to 50 Mbps
  concurrent_users: 20
  session_duration: 60
  metrics_enabled: true
  metrics_interval: 5

---
# Long-duration test for ML model training
apiVersion: google.dev/v1
kind: TrafficTest
metadata:
  name: ml-training-dataset
  namespace: default
  labels:
    scenario: ml-training
    pattern: periodic
    duration: long
spec:
  source_device: test1
  destination_device: test2
  protocol: TCP
  port: 5201
  duration: 7200  # 2 hours
  pattern_type: periodic
  pattern_config:
    wave_type: sine
    period: 1800  # 30 minute cycles
    base_rate: 30Mbps
    amplitude: 20Mbps  # varies between 10-50 Mbps
  concurrent_users: 40
  session_duration: 180
  think_time: 10
  metrics_enabled: true
  metrics_interval: 15  # Moderate sampling for long tests
