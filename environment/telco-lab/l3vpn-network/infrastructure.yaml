      bandwidth: "100mbit"
      vlan: 310
      network_type: "p2p"
      connected_routers:
        - router_name: "p1"
          interface: "eth5"
          ip_address: "172.16.100.1"
        - router_name: "pe2"
          interface: "eth1"
          ip_address: "172.16.100.2"
    - name: p3-pe2
      subnet: "172.16.110.0/24"
      bandwidth: "100mbit"
      vlan: 311
      network_type: "p2p"
      connected_routers:
