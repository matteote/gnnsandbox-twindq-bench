- name: Test reachability to AMF
  ansible.builtin.command: ping -c 4 "{{amfAddress}}"
  register: ping_result
  failed_when: ping_result.rc != 0

- name: copy UERANSIM config
  ansible.builtin.template: 
    src: "{{item}}"
    dest: "/opt/{{item}}"
  loop:
  - gnbcfg.yaml
  - uecfg.yaml
  - docker-compose.yaml
  retries: 3
  delay: 2
  register: copy_result
  until: copy_result is succeeded

- name: verify all UERANSIM config files exist before starting
  ansible.builtin.stat:
    path: "/opt/{{item}}"
  loop:
  - gnbcfg.yaml
  - uecfg.yaml
  - docker-compose.yaml
  register: file_check
  failed_when: not file_check.stat.exists

- name: start UERANSIM
  community.docker.docker_compose_v2:
    project_src: /opt/
    state: present
