- name: Install aptitude
  apt:
    name: aptitude
    state: latest
    update_cache: true

- name: install base apt packages
  ansible.builtin.apt:
    pkg:
      - git
      - iproute2
      - python3
      - python3-pip
      - gcc
      - g++ 
      - cmake 
      - autoconf 
      - libtool 
      - pkg-config 
      - libmnl-dev 
      - libyaml-dev
      - ca-certificates 
      - gnupg-agent
      - apt-transport-https 
      - software-properties-common
      - bridge-utils
    state: latest
    update_cache: true

- name: install gcc 12
  ansible.builtin.apt:
    pkg:
      - gcc-12
    state: latest

- name: install pip dependencies
  ansible.builtin.pip:
    name:
      - ansible 
      - docker 
      - docker-compose

- name: update the version of requests
  command: pip install requests==2.28.1

- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu focal stable
    state: present

- name: Install docker-ce
  apt:
    pkg:
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
    state: latest
    update_cache: true

- name: install headers matching kernel
  apt:
    pkg:
    - linux-headers-{{ansible_kernel}}

- name: create /opt/gtp5
  file:
    path: /opt/gtp5
    state: directory
    mode: '0777' 

- name: git checkout from gtp5
  ansible.builtin.git:
    version: v0.8.10
    depth: 1
    repo: https://github.com/free5gc/gtp5g.git
    dest: /opt/gtp5
    clone: yes  # Ensure the repo is cloned (not just updated)
    update: yes
    force: yes 

- name: Build and install gtp module
  ansible.builtin.shell: |
    make clean
    make
    make install
  args:
    chdir: /opt/gtp5

