mcc: '208'          # Mobile Country Code value
mnc: '93'           # Mobile Network Code value (2 or 3 digits)

nci: '{{cellid}}'  # NR Cell Identity (36-bit)
idLength: 32        # NR gNB ID length in bits [22...32]
tac: 1              # Tracking Area Code

linkIp: {{ ansible_facts.ens5.ipv4.address }}   # gNB's local IP address for Radio Link Simulation (Usually same with local IP)
ngapIp: {{ ansible_facts.ens5.ipv4.address }}  # gNB's local IP address for N2 Interface (Usually same with local IP)
gtpIp: {{ ansible_facts.ens5.ipv4.address }}    # gNB's local IP address for N3 Interface (Usually same with local IP)

# List of AMF address information
amfConfigs:
  - address: {{ amfAddress }}
    port: {{ amfPort }}

# List of supported S-NSSAIs by this gNB
slices:
  - sst: 0x1
    sd: 0x010203

# Indicates whether or not SCTP stream number errors should be ignored.
ignoreStreamIds: true
