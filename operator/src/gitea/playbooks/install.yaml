- hosts: all
  become: True
  gather_facts: True
  tasks:

    - name: install Gitea
      import_role:
        name: install

    - name: create gitea repos
      import_role:
        name: create-gitea-repos

    - name: incidents-repo
      import_role:
        name: incidents

    - name: networkdesign-repo
      import_role:
        name: networkdesign

    - name: root-repo
      import_role:
        name: rootrepo

    - name: network-repo
      import_role:
        name: network-repo

