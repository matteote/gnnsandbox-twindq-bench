- name: delete pointtopointservice
  ansible.builtin.file:
    path: /opt/network-repo/pointtopointservice-ptp1.yaml
    state: absent

- name: push network files
  ansible.builtin.copy:
    src: "{{item}}"
    dest: "/opt/network-repo/{{item}}"
    owner: git
