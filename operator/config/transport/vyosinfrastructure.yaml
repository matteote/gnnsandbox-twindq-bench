apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vyosinfrastructures.google.dev
spec:
  group: google.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                description:
                  type: string
                  description: "Optional description of the infrastructure"
                networks:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - subnet
                    properties:
                      name:
                        type: string
                      subnet:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                      gateway:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                      ipv6_subnet:
                        type: string
                      description:
                        type: string
                      vlan:
                        type: integer
                        minimum: 1
                        maximum: 4094
                      mtu:
                        type: integer
                        minimum: 68
                        maximum: 9000
                        default: 1500
                      network_type:
                        type: string
                        enum: ["p2p", "multi-access", "management", "loopback"]
                        default: "multi-access"
                      bandwidth:
                        type: string
                        pattern: '^[0-9]+[kmg]?bit$'
                      connected_routers:
                        type: array
                        items:
                          type: object
                          required:
                            - router_name
                            - interface
                          properties:
                            router_name:
                              type: string
                            interface:
                              type: string
                              pattern: '^eth[0-9]+$'
                            ip_address:
                              type: string
                              pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                routers:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      hostname:
                        type: string
                      router_id:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                      type:
                        type: string
                        enum: ["vyos", "linux", "frr"]
                        default: "vyos"
                      role:
                        type: string
                        enum: ["P", "PE", "CE", "RR"]
                      image:
                        type: string
                        default: "vyos:1.5"
                      location:
                        type: object
                        description: "GPS coordinates and location information for the router"
                        properties:
                          latitude:
                            type: number
                            description: "Latitude in decimal degrees"
                            minimum: -90
                            maximum: 90
                          longitude:
                            type: number
                            description: "Longitude in decimal degrees"
                            minimum: -180
                            maximum: 180
                          city:
                            type: string
                            description: "City or location name"
                          country:
                            type: string
                            description: "Country name or code"
                          site:
                            type: string
                            description: "Site or datacenter identifier"
                      interfaces:
                        type: array
                        items:
                          type: object
                          required:
                            - name
                            - network
                          properties:
                            name:
                              type: string
                              pattern: '^(eth[0-9]+|lo)$'
                            network:
                              type: string
                            address:
                              type: string
                              pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
                            description:
                              type: string
                      services:
                        type: object
                        properties:
                          dhcp:
                            type: array
                            items:
                              type: object
                              required:
                                - network
                                - gateway
                              properties:
                                network:
                                  type: string
                                gateway:
                                  type: string
                                dns_servers:
                                  type: array
                                  items:
                                    type: string
                                range:
                                  type: object
                                  required:
                                    - start
                                    - end
                                  properties:
                                    start:
                                      type: string
                                    end:
                                      type: string
                                static_mappings:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - ip
                                      - mac
                                    properties:
                                      name:
                                        type: string
                                      ip:
                                        type: string
                                      mac:
                                        type: string
                          nat:
                            type: object
                            properties:
                              source:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - rule
                                    - outbound_interface
                                  properties:
                                    rule:
                                      type: integer
                                    source:
                                      type: string
                                    outbound_interface:
                                      type: string
                                    translation:
                                      type: string
                                      enum: ["masquerade", "address"]
                                      default: "masquerade"
                      qos_policies:
                        type: array
                        items:
                          type: object
                          required:
                            - policy_name
                            - interface
                          properties:
                            policy_name:
                              type: string
                            interface:
                              type: string
                            direction:
                              type: string
                              enum: ["in", "out"]
                              default: "out"
                      firewall_policies:
                        type: array
                        items:
                          type: object
                          required:
                            - policy_name
                            - interface
                          properties:
                            policy_name:
                              type: string
                            interface:
                              type: string
                            direction:
                              type: string
                              enum: ["in", "out", "local"]
                qos:
                  type: object
                  properties:
                    policies:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                          - bandwidth
                        properties:
                          name:
                            type: string
                          bandwidth:
                            type: string
                          classes:
                            type: array
                            items:
                              type: object
                              required:
                                - name
                                - priority
                                - bandwidth
                              properties:
                                name:
                                  type: string
                                priority:
                                  type: integer
                                bandwidth:
                                  type: string
                                dscp:
                                  type: string
                security:
                  type: object
                  properties:
                    firewall:
                      type: object
                      properties:
                        policies:
                          type: array
                          items:
                            type: object
                            required:
                              - name
                              - default_action
                            properties:
                              name:
                                type: string
                              default_action:
                                type: string
                                enum: ["accept", "drop", "reject"]
                              rules:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - number
                                    - action
                                  properties:
                                    number:
                                      type: integer
                                    action:
                                      type: string
                                      enum: ["accept", "drop", "reject"]
                                    protocol:
                                      type: string
                                      enum: ["tcp", "udp", "icmp", "all"]
                                    ports:
                                      type: array
                                      items:
                                        type: integer
                                    source:
                                      type: string
                                    destination:
                                      type: string
                                    state:
                                      type: array
                                      items:
                                        type: string
                                        enum: ["established", "related", "new", "invalid"]
                                    description:
                                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                routers:
                  type: array
                  items:
                    type: string
                networks:
                  type: array
                  items:
                    type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Routers
          type: integer
          jsonPath: .status.routers[*]
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  names:
    kind: VyOSInfrastructure
    plural: vyosinfrastructures
    singular: vyosinfrastructure
    shortNames:
      - vyosinfra
      - infra
  scope: Namespaced
