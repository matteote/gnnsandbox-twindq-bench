apiVersion: google.dev/v1
kind: VyOSUnderlay
metadata:
  name: l3vpn-underlay
  namespace: network
spec:
  infrastructureRef: l3vpn-infra
  routing:
    ospf:
      router_id_source: "loopback"
      areas: [{ area_id: "0.0.0.0", type: "backbone" }]
    bgp:
      as_number: 65001
      router_id_source: "loopback"
      route_reflectors: ["10.0.0.1", "10.0.0.2"]
  mpls:
    enabled: true
    ldp:
      router_id_interface: "loopback"
  routers:
    - name: "p1"
      protocols:
        ospf:
          router_id: "10.0.0.3"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.3", interfaces: ["eth1", "eth2", "eth3", "eth4", "eth5"] }
    - name: "p2"
      protocols:
        ospf:
          router_id: "10.0.0.4"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.4", interfaces: ["eth1", "eth2", "eth3", "eth4", "eth5"] }
    - name: "p3"
      protocols:
        ospf:
          router_id: "10.0.0.5"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.5", interfaces: ["eth1", "eth2", "eth3", "eth4", "eth5"] }
    - name: "p4"
      protocols:
        ospf:
          router_id: "10.0.0.6"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.6", interfaces: ["eth1", "eth2", "eth3", "eth4", "eth5"] }
    - name: "rr1"
      protocols:
        ospf:
          router_id: "10.0.0.1"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.1"
          route_reflector: true
          neighbors:
            - { peer: "10.0.0.7", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.8", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.10", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.11", remote_as: 65001, route_reflector_client: true }
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.1", interfaces: ["eth1", "eth2"] }
    - name: "rr2"
      protocols:
        ospf:
          router_id: "10.0.0.2"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.2"
          route_reflector: true
          neighbors:
            - { peer: "10.0.0.7", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.8", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.10", remote_as: 65001, route_reflector_client: true }
            - { peer: "10.0.0.11", remote_as: 65001, route_reflector_client: true }
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.2", interfaces: ["eth1", "eth2"] }
    - name: "pe1"
      protocols:
        ospf:
          router_id: "10.0.0.7"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.7"
          neighbors: [{ peer: "10.0.0.1", remote_as: 65001 }, { peer: "10.0.0.2", remote_as: 65001 }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.7", interfaces: ["eth1", "eth4"] }
    - name: "pe2"
      protocols:
        ospf:
          router_id: "10.0.0.8"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.8"
          neighbors: [{ peer: "10.0.0.1", remote_as: 65001 }, { peer: "10.0.0.2", remote_as: 65001 }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.8", interfaces: ["eth1", "eth2"] }
    - name: "pe3"
      protocols:
        ospf:
          router_id: "10.0.0.10"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.10"
          neighbors: [{ peer: "10.0.0.1", remote_as: 65001 }, { peer: "10.0.0.2", remote_as: 65001 }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.10", interfaces: ["eth1", "eth4"] }
    - name: "pe4"
      protocols:
        ospf:
          router_id: "10.0.0.11"
          areas: [{ area: "0.0.0.0", type: "backbone" }]
        bgp:
          as_number: 65001
          router_id: "10.0.0.11"
          neighbors: [{ peer: "10.0.0.1", remote_as: 65001 }, { peer: "10.0.0.2", remote_as: 65001 }]
        mpls:
          enabled: true
          ldp: { router_id: "10.0.0.11", interfaces: ["eth1", "eth4"] }
