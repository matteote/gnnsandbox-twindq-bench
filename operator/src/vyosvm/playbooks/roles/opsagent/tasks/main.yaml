---
- name: Check if ops-agent is installed
  command: dpkg-query -W google-cloud-ops-agent
  register: ops_agent_check
  failed_when: false
  changed_when: false

- name: Download GCP Ops Agent repo script
  ansible.builtin.get_url:
    url: https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
    dest: /tmp/add-google-cloud-ops-agent-repo.sh
    mode: '0755'
  when: ops_agent_check.rc != 0

- name: Install GCP Ops Agent
  ansible.builtin.shell: bash /tmp/add-google-cloud-ops-agent-repo.sh --also-install
  when: ops_agent_check.rc != 0

- name: Apply minimal Ops Agent config (logging only)
  # The full config including Prometheus scrape targets is written later by
  # the VyOSInfrastructure operator so it can be kept in sync with the
  # actual router inventory.  This task just provides a safe default that
  # enables syslog collection without any (potentially stale) scrape targets.
  ansible.builtin.copy:
    src: default-config.yaml
    dest: /etc/google-cloud-ops-agent/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: Restart Ops Agent

- name: Ensure Ops Agent is running
  ansible.builtin.systemd:
    name: google-cloud-ops-agent
    state: started
    enabled: true
