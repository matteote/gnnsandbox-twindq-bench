# Lightweight playbook to re-render the Ops Agent config and restart
# the agent whenever the VyOSInfrastructure router inventory changes.
#
# Expected extra vars:
#   routers  - list of {name, ip_address} dicts, one per router in the
#              management network (may be empty on topology teardown)
#   devices  - list of {name, mgmt_ip} dicts, one per device running
#              traffic-agent (may be empty if no devices are defined)
---
- name: Update Ops Agent scrape config
  hosts: all
  become: true
  gather_facts: no

  vars:
    routers: "{{ routers | default([]) }}"
    devices: "{{ devices | default([]) }}"

  handlers:
    - name: Restart Ops Agent
      ansible.builtin.systemd:
        name: google-cloud-ops-agent
        state: restarted

  tasks:
    - name: Render Ops Agent config from router inventory
      ansible.builtin.template:
        src: templates/ops-agent-config.yaml.j2
        dest: /etc/google-cloud-ops-agent/config.yaml
        owner: root
        group: root
        mode: '0644'
      notify: Restart Ops Agent
