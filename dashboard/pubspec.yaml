  http: ^1.2.2
  go_router: ^14.6.2
  fl_chart: ^0.69.0
  flutter_ai_toolkit: ^0.10.0
  uuid: ^4.5.1
  intl: ^0.19.0
  pointer_interceptor: ^0.10.1+2
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
