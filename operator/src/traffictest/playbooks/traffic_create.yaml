    #           # Create results JSON
    #           cat > "$RESULTS_FILE" << EOF
    #       {
    #         "returncode": $EXIT_CODE,
    #         "stdout": "$OUTPUT",
    #         "stderr": "",
    #         "completed": true,
    #         "timestamp": "$(date -Iseconds)"
    #       }
    #       EOF
    #           break
    #         fi
    #         sleep 10
