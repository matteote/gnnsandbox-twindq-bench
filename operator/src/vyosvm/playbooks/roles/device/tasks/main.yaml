# Compute the versioned device image tag so the image is rebuilt automatically
# when agent_version changes.
- name: Resolve versioned device image tag
  set_fact:
    versioned_device_image: "{{ device_image | regex_replace(':.*$', '') }}:{{ agent_version }}"

# Check whether the versioned image already exists locally.
- name: Check if Device image exists
  shell: docker images -q {{ versioned_device_image }}
  register: image_check
  changed_when: false

- name: Create build directory
  file:
    path: "{{ build_context }}"
    state: directory
    mode: '0777'
  when: image_check.stdout == ""

- name: Copy Dockerfile to target
  copy:
    src: files/Dockerfile
    dest: "{{ build_context }}/Dockerfile"
    mode: '0644'
  when: image_check.stdout == ""

- name: Copy entrypoint script to target
  copy:
    src: files/entrypoint.sh
    dest: "{{ build_context }}/entrypoint.sh"
    mode: '0755'
  when: image_check.stdout == ""

- name: Write local build script to build context
  copy:
    dest: "{{ build_context }}/build.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      # Local build script — generated by Ansible; run from {{ build_context }}
      set -euo pipefail
      cd "$(dirname "$0")"
      tar -czf - . | docker build \
        --build-arg AGENT_IMAGE={{ agent_image }}:{{ agent_version }} \
        -t {{ versioned_device_image }} \
        -t {{ device_image }} \
        -
  when: image_check.stdout == ""

- name: Build Device image using tar context
  shell: |
    cd {{ build_context }} && tar -czf - . | docker build \
      --build-arg AGENT_IMAGE={{ agent_image }}:{{ agent_version }} \
      -t {{ versioned_device_image }} \
      -t {{ device_image }} \
      -
  when: image_check.stdout == ""

- name: Display build result (already exists)
  debug:
    msg: "Device image {{ versioned_device_image }} already exists — skipping build"
  when: image_check.stdout != ""

- name: Display build result (built)
  debug:
    msg: "Device image {{ versioned_device_image }} built successfully"
  when: image_check.stdout == ""
