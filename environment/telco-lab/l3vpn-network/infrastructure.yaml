apiVersion: google.dev/v1
kind: VyOSInfrastructure
metadata:
  name: l3vpn-infra
  namespace: default
  labels:
    type: telco-lab
    environment: lab
spec:
  description: "L3VPN Infrastructure"
  networks:
    - name: p1-p2
      subnet: "172.16.30.0/24"
      bandwidth: "1gbit"
      vlan: 301
      network_type: "p2p"
      connected_routers:
        - router_name: "p1"
          interface: "eth1"
          ip_address: "172.16.30.1"
        - router_name: "p2"
          interface: "eth1"
          ip_address: "172.16.30.2"
    - name: p1-p3
      subnet: "172.16.40.0/24"
      bandwidth: "1gbit"
      vlan: 302
      network_type: "p2p"
      connected_routers:
        - router_name: "p1"
          interface: "eth2"
          ip_address: "172.16.40.1"
        - router_name: "p3"
          interface: "eth2"
          ip_address: "172.16.40.2"
    - name: p2-p4
      subnet: "172.16.60.0/24"
      bandwidth: "1gbit"
      vlan: 303
      network_type: "p2p"
      connected_routers:
