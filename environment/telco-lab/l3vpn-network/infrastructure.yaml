          interface: "eth4"
          ip_address: "172.16.70.1"
        - router_name: "rr2"
          interface: "eth2"
          ip_address: "172.16.70.2"
    - name: p4-rr2
      subnet: "172.16.80.0/24"
      bandwidth: "1gbit"
      vlan: 308
      network_type: "p2p"
      connected_routers:
        - router_name: "p4"
          interface: "eth1"
          ip_address: "172.16.80.1"
        - router_name: "rr2"
          interface: "eth1"
          ip_address: "172.16.80.2"
