        - router_name: "p4"
          interface: "eth3"
          ip_address: "172.16.50.2"
    - name: p1-rr1
      subnet: "172.16.10.0/24"
      bandwidth: "1gbit"
      vlan: 305
      network_type: "p2p"
      connected_routers:
        - router_name: "p1"
          interface: "eth4"
          ip_address: "172.16.10.1"
        - router_name: "rr1"
          interface: "eth2"
          ip_address: "172.16.10.2"
    - name: p2-rr1
      subnet: "172.16.20.0/24"
      bandwidth: "1gbit"
      vlan: 306
      network_type: "p2p"
      connected_routers:
