---
# Advanced Linux Network Test with Routers
# This creates networks with connected routers to test veth pair monitoring
#
# Usage:
#   kubectl apply -f test-networks-with-routers.yaml
#   
#   # Wait for networks to be ready
#   kubectl wait --for=condition=Ready linuxnetwork/test-data-net -n automation --timeout=60s
#   
#   # Check network status
#   kubectl get linuxnetwork -n automation
#   kubectl get vyosrouter -n automation
#   
#   # Check Spanner state
#   # Query LogicalSubnet for bridge state
#   # Query PhysicalInterface for veth pairs
#   # Query PhysicalLink for veth connections

# Create data network
apiVersion: google.dev/v1
kind: LinuxNetwork
metadata:
  name: test-data-net
  namespace: default
spec:
  name: test-data-net
  source_network: test
  network_type: multi-access
  gateway: 192.168.100.1
  bandwidth: 1gbit

---
# Create management network
apiVersion: google.dev/v1
kind: LinuxNetwork
metadata:
  name: test-mgmt-net
  namespace: default
spec:
  name: test-mgmt-net
  source_network: test
  network_type: management
  gateway: 10.200.0.1
  bandwidth: 100mbit

---
# Create test router 1
apiVersion: google.dev/v1
kind: VyOSRouter
metadata:
  name: test-router-1
  namespace: default
spec:
  hostname: test-router-1
  router_id: 192.168.100.10
  image: vyos:1.5
  source_network: test
  role: CE
  location:
    city: TestLab
    latitude: 37.7749
    longitude: -122.4194

  interfaces:
    - name: eth0
      address: 192.168.100.10/24
      description: "Data interface"
      linux_network: test-data-net
      enabled: true

    - name: eth1
      address: 10.200.0.10/24
      description: "Management interface"
      linux_network: test-mgmt-net
      enabled: true

---
# Create test router 2
apiVersion: google.dev/v1
kind: VyOSRouter
metadata:
  name: test-router-2
  namespace: default
spec:
  hostname: test-router-2
  router_id: 192.168.100.20
  image: vyos:1.5
  source_network: test
  role: CE
  location:
    city: TestLab
    latitude: 37.7749
    longitude: -122.4194

  interfaces:
    - name: eth0
      address: 192.168.100.20/24
      description: "Data interface"
      linux_network: test-data-net
      enabled: true

    - name: eth1
      address: 10.200.0.20/24
      description: "Management interface"
      linux_network: test-mgmt-net
      enabled: true
