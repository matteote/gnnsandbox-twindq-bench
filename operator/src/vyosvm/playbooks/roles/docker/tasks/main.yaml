- name: Install docker-ce
  apt:
    pkg:
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
    state: latest
    update_cache: true
  when: docker_check.rc != 0

- name: allow traffic in DOCKER-USER chain
  ansible.builtin.shell: |
    iptables -C DOCKER-USER -j ACCEPT 2>/dev/null || iptables -I DOCKER-USER -j ACCEPT

- name: ensure ufw is disabled
  ansible.builtin.shell: ufw disable
