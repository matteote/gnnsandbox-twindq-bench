---
- name: Traffic Test Management
  hosts: all
  become: true
  gather_facts: true
  vars:
    # === Paths on host VM (host)
    # global files
    #traffic_generator_file: "/tmp/traffic_generator.py"
    #metrics_collector_file: "/tmp/metrics_collector.py"
    #start_traffic_test_file: "/tmp/start_traffic_test.sh"
    # per test files
    traffic_script_dir: "/tmp/traffic_test_{{ test_name | default('unknown') }}_{{ dest_port }}"
    traffic_generator_file: "{{ traffic_script_dir }}/traffic_generator.py"
    metrics_collector_file: "{{ traffic_script_dir }}/metrics_collector.py"
    start_traffic_test_file: "{{ traffic_script_dir }}/start_traffic_test.sh"
    stop_traffic_test_file: "{{ traffic_script_dir }}/stop_traffic_test.sh"
    is_traffic_test_running_file: "{{ traffic_script_dir }}/is_traffic_test_running.sh"
    config_file: "{{ traffic_script_dir }}/config.json"
    results_file: "{{ traffic_script_dir }}/results.json"
    pid_file: "{{ traffic_script_dir }}/traffic_test.pid"
    log_file: "{{ traffic_script_dir }}/traffic_test.log"
    exit_code_file:  "{{ traffic_script_dir }}/exit_code"
    iperf_server_log_file: "{{ traffic_script_dir }}/iperf3_server.log"


  tasks:
    - name: Debug operation
      debug:
        msg: "Operation: {{ operation }}, Source: {{ source_device }}, Dest: {{ destination_device }}"

    #########################################################################
    # STATUS OPERATION
    #########################################################################
      
    - name: Check if python traffic generator is still running in source container
      shell: "docker exec {{ source_device }} {{pgrep -f '{{ traffic_generator_file | basename }}.*{{ config_file | basename}}' || echo 'not_running}}'"
      register: process_status
      failed_when: false

    - name: Check if wrapper script is still running in container
      shell: "docker exec {{ source_device }} pgrep -f '{{ start_traffic_test_file | basename }}.*{{ dest_port }}' || echo 'not_running'"
      register: wrapper_status
      failed_when: false

    - name: Check iperf3 server status
      shell: "docker exec {{ destination_device }} sh -c '{{ is_traffic_test_running_file }} {{ destination_ip }} {{ dest_port }} destination'"
      register: server_status
      failed_when: false

    - name: Get current results if available
      shell: |
        if [ -f "{{ results_file }}" ]; then
          cat {{ results_file }}
        else
          echo '{"completed": false, "message": "Test in progress"}'
        fi
      register: current_results
      failed_when: false

    - name: Parse current metrics from results
      set_fact:
        current_metrics: "{{ current_results.stdout | from_json | default({}) }}"

    - name: Determine overall status
      set_fact:
        overall_status: >-
          {%- if process_status.stdout != "not_running" or wrapper_status.stdout != "not_running" -%}
            Running
          {%- elif current_metrics.completed | default(false) -%}
            Completed
          {%- else -%}
            Unknown
          {%- endif -%}

    - name: Set status facts
      set_fact:
        status: "{{ overall_status }}"
        message: "Traffic Generator: {{ 'running' if process_status.stdout != 'not_running' else 'stopped' }}, Wrapper: {{ 'running' if wrapper_status.stdout != 'not_running' else 'stopped' }}, Server: {{ 'running' if server_status.stdout != 'not_running' else 'stopped' }}"
        current_metrics: "{{ current_metrics }}"


    #########################################################################
    # FINAL RESULT
    #########################################################################
    
    - name: Return operation result
      debug:
        msg: "Operation {{ operation }} completed successfully"
