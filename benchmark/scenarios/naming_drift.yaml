name: naming_drift
description: >
  Catalog has heavy split- and merged-identity defects; telemetry untouched.
  Tests entity resolution on the system under test.

seed: 17

inputs:
  golden_twin: benchmark/examples/golden_twin/l3vpn-hub-spoke.json

outputs:
  root: benchmark/out/naming_drift/
  catalog_dir: benchmark/out/naming_drift/catalog/
  telemetry_path: benchmark/out/naming_drift/telemetry.json
  ledger_path: benchmark/out/naming_drift/defect_ledger.jsonl

defects:
  - id: split_routers
    class: uniqueness.split_identity
    target_projection: catalog
    target_entity_type: PhysicalRouter
    selection:
      mode: random_rate
      rate: 0.25

  - id: merge_routers
    class: uniqueness.merged_identity
    target_projection: catalog
    target_entity_type: PhysicalRouter
    selection:
      mode: fixed_count
      count: 1
