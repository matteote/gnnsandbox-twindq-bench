---
- name: Build Device Docker Image
  hosts: all
  become: true
  gather_facts: yes

  tasks:
    - name: install base packages
      import_role:
        name: base

    - name: install docker
      import_role:
        name: docker

    - name: install ops agent
      import_role:
        name: opsagent

    - name: build device image
      import_role:
        name: device

    - name: build vyos image
      import_role:
        name: vyos

    - name: test scripts
      import_role:
        name: tests