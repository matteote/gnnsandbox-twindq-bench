<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>Provider Edge Router</title>

  <!-- Flat 2D Circle Base - Medium blue for PE -->
  <circle cx="50" cy="50" r="45" fill="#1565C0" />

  <!-- Router arrows -->
  <g fill="#FFFFFF">
    <!-- Left Arrow (pointing Right, inward) -->
    <path d="M20,47 L35,47 L35,42 L45,50 L35,58 L35,53 L20,53 Z" />
    <!-- Right Arrow (pointing Right, outward) -->
    <path d="M55,47 L70,47 L70,42 L80,50 L70,58 L70,53 L55,53 Z" />
    <!-- Top Arrow (pointing Up) -->
    <path d="M47,45 L47,30 L42,30 L50,20 L58,30 L53,30 L53,45 Z" />
    <!-- Bottom Arrow (pointing Down) -->
    <path d="M47,55 L47,70 L42,70 L50,80 L58,70 L53,70 L53,55 Z" />
  </g>

  <!-- VRF/Route Table icon - bottom left of circle -->
  <!-- Table background -->
  <rect x="12" y="68" width="28" height="20" rx="2" ry="2" fill="#0D47A1" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Header row divider -->
  <line x1="12" y1="74" x2="40" y2="74" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Row dividers -->
  <line x1="12" y1="79" x2="40" y2="79" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <line x1="12" y1="84" x2="40" y2="84" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <!-- Column divider -->
  <line x1="24" y1="68" x2="24" y2="88" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Row content dots (representing entries) -->
  <rect x="14" y="76" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.8"/>
  <rect x="26" y="76" width="11" height="2" rx="1" fill="#FFFFFF" opacity="0.8"/>
  <rect x="14" y="81" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="26" y="81" width="11" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <!-- Header labels (tiny) -->
  <rect x="14" y="70" width="6" height="2" rx="1" fill="#90CAF9" opacity="0.9"/>
  <rect x="26" y="70" width="10" height="2" rx="1" fill="#90CAF9" opacity="0.9"/>
</svg>
